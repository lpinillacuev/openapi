name: Regenerate derived specs after merge

# Triggered when spec3.yaml merges to main.
# Generates ALL derived files from the updated spec3.yaml:
#   1. spec3.json           — JSON twin of spec3.yaml
#   2. spec3.sdk.yaml/json  — SDK variant with x-mp-sdk-coverage
#   3. by-site/*/spec3.yaml — country-scoped specs (via bundle.py)
#   4. by-product/*/spec3.yaml — product-scoped specs (via bundle.py)
#   5. spec3.reference.json — DevSite api-json per product (via build_reference.py)
#   6. push_to_api.py       — sends updated specs to external product API

on:
  push:
    branches:
      - main
    paths:
      - spec3.yaml

jobs:
  regenerate:
    name: spec3.yaml → all derived specs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "specbot"
          git config user.email "specbot@mercadolibre.com"

      # ── Step 1: spec3.json + spec3.sdk.yaml/json ──────────────────────────
      - name: Generate spec3.json and SDK variants
        run: python scripts/generate_spec_json.py spec3.yaml spec3.json
        working-directory: ${{ github.workspace }}

      # ── Step 2: by-site + by-product specs ───────────────────────────────
      # Runs phases 1-3 individually to skip Phase 4 (build_reference.py / DevSite)
      # which is disabled until the DevSite flow is ready.
      - name: Regenerate by-site and by-product specs
        run: |
          python scripts/bundle.py --schemas-only
          python scripts/bundle.py --sites-only
          python scripts/bundle.py --products-only
        working-directory: ${{ github.workspace }}

      # ── Step 3: spec3.reference.json per product ─────────────────────────
      # TODO: habilitar cuando el flujo DevSite esté listo
      - name: Build reference specs
        if: false
        continue-on-error: true
        run: python scripts/build_reference.py --all
        working-directory: ${{ github.workspace }}

      # ── Step 4: Commit all generated files ───────────────────────────────
      - name: Commit regenerated specs
        run: |
          git add spec3.json by-site/ by-product/ schemas/ || true
          git add "spec3.sdk.yaml" "spec3.sdk.json" || true
          if git diff --cached --quiet; then
            echo "No changes in derived specs — nothing to commit."
          else
            git commit -m "chore(derived): regenerate all specs from spec3.yaml [skip ci]"
            git push origin main
            echo "Derived specs pushed to main."
          fi

      # ── Step 5: Finalize KVS decisions post-merge ────────────────────────
      # Compares KVS pending paths with final spec3.yaml to determine:
      # - Paths in spec3.yaml → KVS whitelist (were approved)
      # - Paths NOT in spec3.yaml → KVS blacklist (were rejected)
      # Clears KVS pending for each changed app.
      - name: Sync KVS decisions from merged spec
        continue-on-error: true
        env:
          BOT_URL: ${{ secrets.BOT_SYNC_SPECS_URL || 'https://beta-bot-sync-specs.melioffice.com' }}
        run: |
          COMMIT_SHA="${{ github.sha }}"

          # Get apps that have pending paths from the changed spec
          # For each app registered in apps.yaml, call sync-from-merge
          python3 - <<'EOF'
          import yaml, subprocess, json, sys

          with open('apps.yaml') as f:
              apps = yaml.safe_load(f).get('apps', [])

          for app in apps:
              fury_app = app['fury_app']
              print(f"Syncing KVS for {fury_app}...")
              try:
                  result = subprocess.run([
                      'curl', '-s', '-X', 'POST',
                      f'${{ env.BOT_URL }}/openapi/policy/{fury_app}/sync-from-merge',
                      '-H', 'Content-Type: application/json',
                      '-H', 'X-github-token: ${{ secrets.GH_PAT }}',
                      '-d', json.dumps({'commitSha': '${{ github.sha }}'})
                  ], capture_output=True, text=True, timeout=30)
                  print(result.stdout or 'no response')
              except Exception as e:
                  print(f"Warning: could not sync KVS for {fury_app}: {e}")

          sys.exit(0)
          EOF

      # ── Step 6: Push specs to external product API ────────────────────────
      # TODO: habilitar cuando el flujo DevSite esté listo
      - name: Push to external product API
        if: false
        continue-on-error: true
        env:
          PRODUCT_SPEC_API_ENDPOINT: ${{ secrets.PRODUCT_SPEC_API_ENDPOINT }}
          PRODUCT_SPEC_API_TOKEN: ${{ secrets.PRODUCT_SPEC_API_TOKEN }}
        run: |
          if [ -n "$PRODUCT_SPEC_API_ENDPOINT" ]; then
            python scripts/push_to_api.py --all
          else
            echo "PRODUCT_SPEC_API_ENDPOINT not set — skipping external API push"
          fi
        working-directory: ${{ github.workspace }}

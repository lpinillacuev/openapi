name: Schema Decisions

# When the reviewer submits Review → Approve, this workflow reads the
# PENDING_SCHEMAS checkboxes and reverts unchecked schemas in spec3.yaml.
#
# Flow:
#   1. The reviewer unchecks unwanted schemas in the PR body
#   2. The reviewer submits Review → Approve
#   3. This workflow detects unchecked schemas and reverts them in spec3.yaml
#   4. The workflow commits the revert to the PR branch
#
# If every schema remains checked, nothing is changed and the PR stays as-is.

on:
  pull_request_review:
    types: [submitted]

jobs:
  revert-rejected-schemas:
    name: Revert rejected schemas
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Verify this is an automatic sync PR
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          APP=$(echo "$BRANCH" | sed -n 's|enhancement/automatic-spec-\([^/]*\)/.*|\1|p')

          if [ -z "$APP" ]; then
            echo "Not an automatic sync PR — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "app=$APP" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "base=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Read PR body and extract unchecked schemas
        id: schemas
        if: steps.ctx.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PR_NUMBER="${{ steps.ctx.outputs.pr_number }}"
          PR_BODY=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json body --jq '.body' 2>/dev/null || echo "")

          # Extract the section between markers
          SECTION=$(echo "$PR_BODY" | \
            awk '/PENDING_SCHEMAS_START/{found=1} found{print} /PENDING_SCHEMAS_END/{exit}')

          if [ -z "$SECTION" ]; then
            echo "No PENDING_SCHEMAS section found in the PR body."
            echo "rejected=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse unchecked lines: - [ ] `SchemaName` — ...
          REJECTED=()
          while IFS= read -r line; do
            if echo "$line" | grep -qE '^\- \[ \]'; then
              NAME=$(echo "$line" | sed "s/- \[ \] \`//;s/\`.*//")
              [ -n "$NAME" ] && REJECTED+=("$NAME")
            fi
          done <<< "$SECTION"

          echo "Rejected schemas: ${REJECTED[*]:-none}"
          # Pass as a JSON array for the Python step
          REJECTED_JSON=$(printf '%s\n' "${REJECTED[@]}" | python3 -c \
            "import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))")
          echo "rejected=$REJECTED_JSON" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        if: |
          steps.ctx.outputs.skip != 'true' &&
          steps.schemas.outputs.rejected != '' &&
          steps.schemas.outputs.rejected != '[]'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ steps.ctx.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Install PyYAML
        if: |
          steps.ctx.outputs.skip != 'true' &&
          steps.schemas.outputs.rejected != '' &&
          steps.schemas.outputs.rejected != '[]'
        run: pip install pyyaml --quiet

      - name: Revert rejected schemas in spec3.yaml
        if: |
          steps.ctx.outputs.skip != 'true' &&
          steps.schemas.outputs.rejected != '' &&
          steps.schemas.outputs.rejected != '[]'
        id: revert
        env:
          BASE_REF: ${{ steps.ctx.outputs.base }}
          REJECTED_JSON: ${{ steps.schemas.outputs.rejected }}
        run: |
          git fetch origin "$BASE_REF"

          python3 - <<'PYEOF'
          import json, os, sys
          import yaml

          base      = os.environ['BASE_REF']
          rejected  = json.loads(os.environ['REJECTED_JSON'])

          if not rejected:
              print("No rejected schemas.")
              sys.exit(0)

          import subprocess

          # Read spec3.yaml from the base branch (original version)
          old_raw = subprocess.check_output(
              ['git', 'show', f'origin/{base}:spec3.yaml']
          ).decode()
          old_spec = yaml.safe_load(old_raw) or {}
          old_schemas = (old_spec.get('components') or {}).get('schemas') or {}

          # Read the current spec3.yaml from the PR branch
          with open('spec3.yaml') as f:
              new_spec = yaml.safe_load(f) or {}

          current_schemas = (new_spec.setdefault('components', {})
                               .setdefault('schemas', {}))

          reverted = []
          for name in rejected:
              old_schema = old_schemas.get(name)
              if old_schema is None:
                  # New schema → remove it
                  if name in current_schemas:
                      del current_schemas[name]
                      reverted.append(f'removed (new schema): {name}')
              else:
                  # Modified schema → restore previous version
                  current_schemas[name] = old_schema
                  reverted.append(f'restored: {name}')

          if not reverted:
              print("No schema needed to be reverted.")
              sys.exit(0)

          with open('spec3.yaml', 'w') as f:
              yaml.dump(new_spec, f,
                        allow_unicode=True,
                        sort_keys=False,
                        default_flow_style=False,
                        width=120)

          for msg in reverted:
              print(f'  ✅ {msg}')

          # Signal for the next step
          with open('/tmp/reverted.txt', 'w') as f:
              f.write('\n'.join(reverted))
          PYEOF

      - name: Commit and push revert
        if: |
          steps.ctx.outputs.skip != 'true' &&
          steps.schemas.outputs.rejected != '' &&
          steps.schemas.outputs.rejected != '[]'
        env:
          REVIEWER: ${{ github.event.review.user.login }}
        run: |
          if [ ! -f /tmp/reverted.txt ] || ! git diff --quiet spec3.yaml; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            SCHEMAS=$(cat /tmp/reverted.txt 2>/dev/null | \
              sed 's/.*: //' | paste -sd', ' -)

            git add spec3.yaml
            git commit -m "revert(schemas): reject [$SCHEMAS] — decided by @$REVIEWER"
            git push
            echo "✅ Revert committed to the PR branch."
          else
            echo "No changes in spec3.yaml — all schemas were accepted."
          fi

name: Spec Diff Comment

# Automatically creates a PR comment with a structured summary of changes in
# spec3.yaml (paths, parameters, schemas).
#
# The reviewer can see exactly what changed in each endpoint from GitHub,
# without reading the raw YAML diff.
# The comment is refreshed on every push to the PR branch.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - 'spec3.yaml'
      - 'spec3.json'
      - 'schemas/**'
      - 'by-product/**'

jobs:
  spec-diff-comment:
    name: Generate spec change summary
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install pyyaml --quiet

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Generate Markdown summary and schema checkboxes
        run: |
          python3 .github/scripts/spec_diff_md.py \
            --base "${{ github.base_ref }}" \
            --output /tmp/spec-diff.md \
            --schema-checkboxes /tmp/schema-checkboxes.md

      - name: Add schema checkboxes to PR body
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -s /tmp/schema-checkboxes.md ]; then
            echo "No schema changes found; skipping PR body update."
            exit 0
          fi

          gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json body \
            --jq '.body // ""' > /tmp/current-pr-body.md

          python3 - <<'PYEOF'
          from pathlib import Path

          start = '<!-- PENDING_SCHEMAS_START -->'
          end = '<!-- PENDING_SCHEMAS_END -->'

          current = Path('/tmp/current-pr-body.md').read_text()
          schema_block = Path('/tmp/schema-checkboxes.md').read_text().strip()

          if start in current and end in current:
              before = current.split(start, 1)[0].rstrip()
              after = current.split(end, 1)[1].lstrip()
              updated = f'{before}\n{schema_block}\n{after}'.strip() + '\n'
          else:
              updated = f'{current.rstrip()}\n\n{schema_block}\n'

          Path('/tmp/updated-pr-body.md').write_text(updated)
          PYEOF

          gh pr edit "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/updated-pr-body.md

          echo "PR body updated with schema checkboxes."

      - name: Create or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -s /tmp/spec-diff.md ]; then
            echo "No spec3.yaml changes detected; skipping comment."
            exit 0
          fi

          MARKER='<!-- spec-diff-summary-bot -->'
          BODY_FILE="/tmp/spec-diff-comment.md"
          {
            echo "$MARKER"
            cat /tmp/spec-diff.md
          } > "$BODY_FILE"

          EXISTING_COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -n 1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
              --raw-field body="$(cat "$BODY_FILE")" > /dev/null
            echo "Comment updated: #${EXISTING_COMMENT_ID}"
          else
            gh issue comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file "$BODY_FILE"
            echo "Comment created on the PR."
          fi

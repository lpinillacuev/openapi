name: Trigger SDK generation

# Triggered when spec3.yaml merges to main.
#
# Flow:
#   1. generate_product_diff.py → detects what changed per product
#   2. spec-agent public API → async-generate (reachable from GitHub Actions)

on:
  push:
    branches:
      - main
    paths:
      - spec3.yaml

jobs:
  trigger-sdk:
    name: spec3.yaml → SDK generation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout openapi
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT || github.token }}
          path: openapi

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml requests

      # ── Step 1: Generate per-product diffs ──────────────────────────────────
      - name: Generate per-product diffs
        id: product_diff
        run: python openapi/scripts/generate_product_diff.py
        working-directory: ${{ github.workspace }}

      - name: Read changed products
        id: changed
        run: |
          if [ -f openapi/by-product/.changed-products ]; then
            CHANGED=$(cat openapi/by-product/.changed-products)
          else
            CHANGED=""
          fi
          echo "products=${CHANGED}" >> $GITHUB_OUTPUT
          echo "has_changes=$([ -n "$CHANGED" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "Changed products: ${CHANGED:-none}"

      # ── Step 2a: Build rich changes summary from diff files ───────────────────
      # Reads each product's diff.yaml (generated in Step 1) and builds a detailed
      # summary of what actually changed: paths added/removed/modified + schemas.
      - name: Build changes summary
        id: build_summary
        if: steps.changed.outputs.has_changes == 'true'
        env:
          CHANGED_PRODUCTS: ${{ steps.changed.outputs.products }}
        run: |
          CHANGES_SUMMARY=$(python3 - <<'PYEOF'
import yaml, os, sys
from pathlib import Path

changed = os.environ.get("CHANGED_PRODUCTS", "")
products = [p.strip() for p in changed.split(",") if p.strip()]
by_product = Path("openapi/by-product")
parts = []

for product in products:
    diff_path = by_product / product / "diff.yaml"
    if not diff_path.exists():
        parts.append(f"{product}: no diff file found")
        continue

    diff = yaml.safe_load(diff_path.read_text()) or {}
    total = diff.get("total_changes", 0)
    lines = [f"{product} ({total} change(s))"]

    paths = diff.get("paths", {})
    if paths.get("added"):
        lines.append(f"paths added: {', '.join(paths['added'])}")
    if paths.get("removed"):
        lines.append(f"paths removed: {', '.join(paths['removed'])}")
    if paths.get("modified"):
        lines.append(f"paths modified: {', '.join(paths['modified'])}")

    schemas = diff.get("schemas", {})
    if schemas.get("added"):
        lines.append(f"schemas added: {', '.join(schemas['added'])}")
    if schemas.get("removed"):
        lines.append(f"schemas removed: {', '.join(schemas['removed'])}")
    if schemas.get("modified"):
        lines.append(f"schemas modified: {', '.join(schemas['modified'])}")

    parts.append("; ".join(lines))

print(" | ".join(parts))
PYEOF
          )
          echo "changes_summary=${CHANGES_SUMMARY}" >> $GITHUB_OUTPUT
          echo "Changes summary: ${CHANGES_SUMMARY}"

      # ── Step 2b: Trigger spec-agent via public API ─────────────────────────────
      # Calls the public async-generate endpoint — reachable from GitHub Actions.
      # The `changes` field contains the full diff summary per product.
      - name: Trigger SDK generation — spec-agent public API
        id: sdk_direct
        if: steps.changed.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          SDK_AGENT_API_KEY: ${{ secrets.SDK_AGENT_API_KEY }}
          SDK_AGENT_COOKIE: ${{ secrets.SDK_AGENT_COOKIE }}
          CHANGES_SUMMARY: ${{ steps.build_summary.outputs.changes_summary }}
        run: |
          echo "Triggering SDK generation with changes: ${CHANGES_SUMMARY}"

          BODY=$(python3 -c "import json, os; print(json.dumps({'flow': 'sdk_generation_test', 'changes': os.environ['CHANGES_SUMMARY']}))")
          echo "Request body: ${BODY}"

          HTTP_CODE=$(curl -s -o /tmp/sdk_response.json -w "%{http_code}" \
            --location 'https://api.mercadolibre.com/spec-agent/public_test/async-generate' \
            --header "X-Api-Key: ${SDK_AGENT_API_KEY}" \
            --header 'Content-Type: application/json' \
            --header "Cookie: _d2id=${SDK_AGENT_COOKIE}" \
            --max-time 60 \
            --data "${BODY}")

          echo "HTTP status: ${HTTP_CODE}"
          cat /tmp/sdk_response.json || true

          if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "202" ]; then
            echo "⚠️ spec-agent returned HTTP ${HTTP_CODE} — see response above"
            exit 1
          fi
          echo "✅ SDK generation triggered successfully"

      - name: Summary
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          DIRECT="${{ steps.sdk_direct.outcome }}"
          echo "## SDK generation" >> $GITHUB_STEP_SUMMARY
          echo "**Changed products:** ${{ steps.changed.outputs.products }}" >> $GITHUB_STEP_SUMMARY
          if [ "$DIRECT" = "success" ]; then
            echo "✅ Triggered via spec-agent public API" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ spec-agent call failed — see step log for details" >> $GITHUB_STEP_SUMMARY
          fi

      - name: No changes
        if: steps.changed.outputs.has_changes != 'true'
        run: echo "No product changes detected — SDK generation skipped."

name: Trigger SDK generation

# Triggered when spec3.yaml merges to main.
#
# Flow:
#   1. generate_product_diff.py → detects what changed per product
#   2. spec-agent public API → async-generate (reachable from GitHub Actions)

on:
  push:
    branches:
      - main
    paths:
      - spec3.yaml

jobs:
  trigger-sdk:
    name: spec3.yaml → SDK generation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout openapi
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT || github.token }}
          path: openapi

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml requests

      # ── Step 1: Generate per-product diffs ──────────────────────────────────
      - name: Generate per-product diffs
        id: product_diff
        run: python openapi/scripts/generate_product_diff.py
        working-directory: ${{ github.workspace }}

      - name: Read changed products
        id: changed
        run: |
          if [ -f openapi/by-product/.changed-products ]; then
            CHANGED=$(cat openapi/by-product/.changed-products)
          else
            CHANGED=""
          fi
          echo "products=${CHANGED}" >> $GITHUB_OUTPUT
          echo "has_changes=$([ -n "$CHANGED" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "Changed products: ${CHANGED:-none}"

      # ── Step 2a: Build full spec payload ──────────────────────────────────────
      # Reads each product's diff.yaml + spec3.yaml and builds a structured JSON
      # body with the complete OpenAPI definitions for every changed path and schema.
      # Writes the full request body to /tmp/sdk_body.json to avoid shell encoding issues.
      - name: Build SDK request body
        id: build_body
        if: steps.changed.outputs.has_changes == 'true'
        env:
          CHANGED_PRODUCTS: ${{ steps.changed.outputs.products }}
          SDK_AGENT_FLOW: ${{ secrets.SDK_AGENT_FLOW || 'sdk_generation_test' }}
          # SDK_AGENT_FLOW controls test vs prod:
          #   test (default): sdk_generation_test
          #   prod:           sdk_generation
        run: |
          python3 openapi/scripts/build_changes_summary.py \
            --output /tmp/sdk_body.json \
            --flow "${SDK_AGENT_FLOW}"
          echo "Flow: ${SDK_AGENT_FLOW}"
          echo "Request body size: $(wc -c < /tmp/sdk_body.json) bytes"

      # ── Step 2b: Trigger spec-agent via public API ─────────────────────────────
      # Sends the full structured spec payload so the SDK agent knows exactly
      # what schemas/paths changed and can generate accurate SDK code.
      # SDK_AGENT_ENDPOINT controls test vs prod:
      #   test: https://api.mercadolibre.com/spec-agent/public_test/async-generate
      #   prod: https://api.mercadolibre.com/spec-agent/public/async-generate
      - name: Trigger SDK generation — spec-agent public API
        id: sdk_direct
        if: steps.changed.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          SDK_AGENT_API_KEY: ${{ secrets.SDK_AGENT_API_KEY }}
          SDK_AGENT_COOKIE: ${{ secrets.SDK_AGENT_COOKIE }}
          SDK_AGENT_ENDPOINT: ${{ secrets.SDK_AGENT_ENDPOINT || 'https://api.mercadolibre.com/spec-agent/public_test/async-generate' }}
        run: |
          echo "Endpoint: ${SDK_AGENT_ENDPOINT}"
          echo "Request body size: $(wc -c < /tmp/sdk_body.json) bytes"

          HTTP_CODE=$(curl -s -o /tmp/sdk_response.json -w "%{http_code}" \
            --location "${SDK_AGENT_ENDPOINT}" \
            --header "X-Api-Key: ${SDK_AGENT_API_KEY}" \
            --header 'Content-Type: application/json' \
            --header "Cookie: _d2id=${SDK_AGENT_COOKIE}" \
            --max-time 60 \
            --data @/tmp/sdk_body.json)

          echo "HTTP status: ${HTTP_CODE}"
          cat /tmp/sdk_response.json || true

          if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "202" ]; then
            echo "⚠️ spec-agent returned HTTP ${HTTP_CODE} — see response above"
            exit 1
          fi
          echo "✅ SDK generation triggered successfully"

      - name: Summary
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          DIRECT="${{ steps.sdk_direct.outcome }}"
          echo "## SDK generation" >> $GITHUB_STEP_SUMMARY
          echo "**Changed products:** ${{ steps.changed.outputs.products }}" >> $GITHUB_STEP_SUMMARY
          if [ "$DIRECT" = "success" ]; then
            echo "✅ Triggered via spec-agent public API" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ spec-agent call failed — see step log for details" >> $GITHUB_STEP_SUMMARY
          fi

      - name: No changes
        if: steps.changed.outputs.has_changes != 'true'
        run: echo "No product changes detected — SDK generation skipped."

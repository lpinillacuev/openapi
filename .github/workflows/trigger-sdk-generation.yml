name: Trigger SDK generation

# Triggered when spec3.yaml merges to main.
#
# Flow (with fallback):
#   1. generate_product_diff.py → detects what changed per product
#   2. push_to_sdk.py → tries to call spec-agent-generator directly (fast path)
#      └─ If unreachable (no VPN from GitHub Actions) → continue-on-error: true
#   3. Bot-sync fallback → already triggered SDK when it created the PR
#      (runs inside ML's network, no VPN needed)

on:
  push:
    branches:
      - main
    paths:
      - spec3.yaml

jobs:
  trigger-sdk:
    name: spec3.yaml → SDK generation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout openapi
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT || github.token }}
          path: openapi

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml requests

      # ── Step 1: Generate per-product diffs ──────────────────────────────────
      - name: Generate per-product diffs
        id: product_diff
        run: python openapi/scripts/generate_product_diff.py
        working-directory: ${{ github.workspace }}

      - name: Read changed products
        id: changed
        run: |
          if [ -f openapi/by-product/.changed-products ]; then
            CHANGED=$(cat openapi/by-product/.changed-products)
          else
            CHANGED=""
          fi
          echo "products=${CHANGED}" >> $GITHUB_OUTPUT
          echo "has_changes=$([ -n "$CHANGED" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "Changed products: ${CHANGED:-none}"

      # ── Step 2a: Try spec-agent-generator directly (fast path) ──────────────
      # If GitHub Actions can reach the endpoint → SDK generated immediately.
      # If unreachable (no VPN) → continue-on-error skips to fallback.
      # Fallback: bot-sync already triggered SDK when it created the PR.
      - name: Trigger SDK generation — direct (fast path)
        id: sdk_direct
        if: steps.changed.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          SDK_GENERATOR_URL: ${{ secrets.SDK_GENERATOR_URL || 'https://spec-agent-generator-test.melioffice.com' }}
          SDK_GENERATOR_TOKEN: ${{ secrets.SDK_GENERATOR_TOKEN }}
          CHANGED_PRODUCTS: ${{ steps.changed.outputs.products }}
        run: |
          python openapi/scripts/push_to_sdk.py \
            --apps "$CHANGED_PRODUCTS" \
            --openapi-path openapi
        working-directory: ${{ github.workspace }}

      # ── Step 2b: Notify bot-sync with the FINAL merged spec ─────────────────
      # Bot-sync reads spec3.yaml at the merge commit SHA (final spec after review)
      # and calls spec-agent-generator via melisystems.com (internal ML network).
      # This ensures the SDK is generated from the spec the reviewer approved,
      # not from the spec when the PR was created.
      - name: Trigger SDK generation — via bot-sync with merged spec
        if: steps.changed.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          BOT_URL: ${{ secrets.BOT_SYNC_SPECS_URL || 'https://beta-bot-sync-specs.melioffice.com' }}
          CHANGED_PRODUCTS: ${{ steps.changed.outputs.products }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          echo "Notifying bot-sync with merge commit: $COMMIT_SHA"
          curl -s -o /tmp/sdk_response.json -w "HTTP: %{http_code}\n" \
            -X POST "${BOT_URL}/openapi/sdk/on-merge" \
            -H "Content-Type: application/json" \
            -H "X-github-token: ${{ secrets.GH_PAT }}" \
            --max-time 300 \
            -d "{\"commitSha\": \"$COMMIT_SHA\", \"apps\": \"$CHANGED_PRODUCTS\"}" || true
          cat /tmp/sdk_response.json || true

      - name: Summary
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          DIRECT="${{ steps.sdk_direct.outcome }}"
          echo "## SDK generation" >> $GITHUB_STEP_SUMMARY
          echo "**Changed products:** ${{ steps.changed.outputs.products }}" >> $GITHUB_STEP_SUMMARY
          if [ "$DIRECT" = "success" ]; then
            echo "✅ Triggered directly from GitHub Actions" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Direct call failed — bot-sync fallback triggered (or already handled when PR was created)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: No changes
        if: steps.changed.outputs.has_changes != 'true'
        run: echo "No product changes detected — SDK generation skipped."

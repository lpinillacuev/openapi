name: Validate Path Policy

on:
  pull_request:
    branches:
      - main
      - 'feature/add-fury-spec'
    paths:
      - 'apps.yaml'

jobs:
  validate-policy:
    name: No pending path decisions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate path policy — no pending entries
        run: python scripts/validate-policy.py

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ❌ Path policy validation failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more paths in \`apps.yaml\` are in **pending** state." >> $GITHUB_STEP_SUMMARY
          echo "Move each pending entry to \`whitelist\` or \`blacklist\` before merging." >> $GITHUB_STEP_SUMMARY

name: Validate Path Policy

on:
  pull_request:
    branches:
      - main
      - 'feature/add-fury-spec'

jobs:
  validate-policy:
    name: No pending path decisions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate path policy — no pending entries
        run: python scripts/validate-policy.py

      - name: Sync bot/pending-paths status when KVS has no pending paths
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          BOT_URL: ${{ secrets.BOT_SYNC_SPECS_URL || 'http://beta-bot-sync-specs.melisystems.com' }}
        run: |
          BRANCH="${{ github.head_ref }}"
          APP=$(echo "$BRANCH" | sed -n 's|enhancement/automatic-spec-\([^/]*\)/.*|\1|p')
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"

          if [ -z "$APP" ]; then
            echo "Not a sync PR — skipping status sync."
            exit 0
          fi

          echo "Syncing bot/pending-paths status for app=$APP commit=$COMMIT_SHA"

          RESPONSE=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            -X POST "${BOT_URL}/openapi/policy/${APP}/sync-status" \
            -H "Content-Type: application/json" \
            -H "X-github-token: ${{ secrets.GH_PAT }}" \
            -d "{\"commitSha\":\"$COMMIT_SHA\"}")

          echo "HTTP: $RESPONSE"
          cat /tmp/sync_response.json || true

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ❌ Path policy validation failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more paths in \`apps.yaml\` are in **pending** state." >> $GITHUB_STEP_SUMMARY
          echo "Move each pending entry to \`whitelist\` or \`blacklist\` before merging." >> $GITHUB_STEP_SUMMARY

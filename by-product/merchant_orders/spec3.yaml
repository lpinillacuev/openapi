                  sponsor_id:
                    type: integer
                  collector:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      nickname:
                        type: string
                  payer:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      nickname:
                        type: string
                  payments:
                    type: array

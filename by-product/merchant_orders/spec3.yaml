paths:
  /merchant_orders:
    post:
      operationId: createMerchantOrder
      summary: Create a merchant order
      tags:
        - Merchant Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                external_reference:
                  type: string
                preference_id:
                  type: string
                marketplace:
                  type: string
                notification_url:
                  type: string
                  format: uri
                  deprecated: true
                sponsor_id:
                  type: integer
                payer:
                  type: object
                  properties:
                    id:
                      type: integer
                    email:
                      type: string
                      format: email
                site_id:
                  type: string
                  enum:
                    - MLA
                    - MLB
                    - MLM
                    - MLC
                    - MCO
                    - MPE
                    - MLU
                items:
                  type: array
                  items:
                    type: object
                additional_info:
                  type: string
                application_id:
                  type: string
      responses:
        '201':
          description: Merchant order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                    enum:
                      - opened
                      - closed
                      - expired
                  order_status:
                    type: string
                    enum:
                      - payment_required
                      - payment_in_process
                      - paid
                      - partially_paid
                      - partially_refunded
                      - pending_cancel
                      - cancelled
                      - refunded
                  external_reference:
                    type: string
                  preference_id:
                    type: string
                  marketplace:
                    type: string
                  application_id:
                    type: string
                  site_id:
                    type: string
                    enum:
                      - MLA
                      - MLB
                      - MLM
                      - MLC
                      - MCO
                      - MPE
                      - MLU
                  notification_url:
                    type: string
                    format: uri
                    deprecated: true
                  sponsor_id:
                    type: integer
                  collector:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      nickname:
                        type: string
                  payer:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      nickname:
                        type: string
                  payments:
                    type: array
                    items:
                      type: object
                  shipments:
                    type: array
                    items:
                      type: object
                  payouts:
                    type: array
                    items:
                      type: object
                  items:
                    type: array
                    items:
                      type: object
                  additional_info:
                    type: string
                  shipping_cost:
                    type: number
                    format: float
                  total_amount:
                    type: number
                    format: float
                  paid_amount:
                    type: number
                    format: float
                  refunded_amount:
                    type: number
                    format: float
                  date_created:
                    type: string
                    format: date-time
                  last_updated:
                    type: string
                    format: date-time
                  canceled:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      description: '**Webhook events triggered:** merchant_order'
    get:
      parameters:
        - description: access token
          in: path
          name: AccessToken
          required: true
          type: string
        - description: status of the MO
          in: query
          name: status
          type: string
        - description: preference_id
          in: query
          name: preference_id
          type: string
        - description: application_id
          in: query
          name: application_id
          type: string
        - description: product_id
          in: query
          name: product_id
          type: string
        - description: payer_id
          in: query
          name: payer_id
          type: integer
        - description: sponsor_id
          in: query
          name: sponsor_id
          type: integer
        - description: external_reference
          in: query
          name: external_reference
          type: string
        - description: site_id
          in: query
          name: site_id
          type: string
        - description: marketplace
          in: query
          name: marketplace
          type: string
        - description: date in format ISO_8601
          in: query
          name: date_created_from
          type: string
        - description: date in format ISO_8601
          in: query
          name: date_created_to
          type: string
        - description: date in format ISO_8601
          in: query
          name: last_updated_from
          type: string
        - description: date in format ISO_8601
          in: query
          name: last_updated_to
          type: string
        - description: item title
          in: query
          name: items
          type: string
        - description: 'limit of the search (Default: 20, Maximum: 50)'
          in: query
          name: limit
          type: integer
        - description: offset of the search
          in: query
          name: offset
          type: integer
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/model.MerchantOrder'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/model.MoError'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.MoError'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/model.MoError'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/model.MoError'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.MoError'
      summary: Search Merchant Orders
      tags:
        - Merchant Orders
    options:
      description: This will show an example of the responses of all the endpoints
      produces:
        - application/json
      responses:
        '200':
          description: This will get an example of the GET, CREATE and UPDATE methods
          schema:
            type: string
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/model.MoError'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/model.MoError'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.MoError'
      summary: Get the options
      tags:
        - Public
  /merchant_orders/{id}:

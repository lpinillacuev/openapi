        - Merchant Orders
    put:
      parameters:
        - description: Merchant Order ID
          in: path
          name: id
          required: true
          type: integer
        - description: Not necessary if Access Token is passed
          in: header
          name: callerID
          type: integer
        - description: Not necessary if Caller ID is passed
          in: header
          name: AccessToken
          type: string
        - description: Merchant Order
          in: body
          name: MO
          required: true
          schema:
            $ref: '#/definitions/model.MerchantOrder'
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/model.MerchantOrder'
        '400':
          description: Bad Request
          schema:
            $ref: '#/definitions/model.MoError'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.MoError'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/model.MoError'
        '404':
          description: Not Found
          schema:
            $ref: '#/definitions/model.MoError'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.MoError'
      summary: Update a Merchant Order
      tags:
        - Merchant Orders
  /merchant_orders/search:

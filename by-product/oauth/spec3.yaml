paths:
  /oauth/token:
    post:
      tags:
        - oauth
      summary: Service in charge of executing the oauth flow
      description: Service in charge of executing the oauth flow
      requestBody:
        description: Request body
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/github_com_mercadolibre_fury_platsec-oauth-api_cmd_internal_dtos.InputRequestDTO'
        required: true
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/github_com_mercadolibre_fury_platsec-oauth-api_cmd_internal_dtos.OutputResponseDTO
        '400':
          description: If an error is found in the validation of the input, the validation of the application and/or the secret.
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/github_com_mercadolibre_fury_platsec-oauth-api_cmd_internal_internalerrors.ErrorDescription
        '500':
          description: If an unexpected error occurs during the process.
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/github_com_mercadolibre_fury_platsec-oauth-api_cmd_internal_internalerrors.ErrorDescription
      x-codegen-request-body-name: input
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: Public key for client-side card tokenization via MercadoPago.js only. Never use for server-side calls.
    mercadopagoOAuth:
      type: oauth2
      description: >-
        OAuth 2.0 authorization_code flow for marketplace on-behalf-of and Wallet Connect integrations. For
        client_credentials and refresh_token, use POST /oauth/token directly with the appropriate grant_type.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded — wait before retrying
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 429
            error: too_many_requests
            message: Rate limit exceeded. Retry after the indicated number of seconds.
  schemas:
    github_com_mercadolibre_fury_platsec-oauth-api_cmd_internal_dtos.InputRequestDTO:
      type: object
      properties:
        client_id:
          type: string
          example: '{123456}'
        client_secret:
          type: string
          example: '{secret from application}'
        code:
          type: string
          example: '{temporal grant}'
        flow:
          type: string
        grant_type:
          type: string
          example: client_credentials
        long_token:
          type: string
          example: 'false'
        redirect_uri:
          type: string
          example: https://www.test.com/path
        refresh_token:
          type: string
          example: '{temporal grant}'
        scope:
          type: string
          example: read,write,offline_access
        test_token:
          type: string
          example: 'false'
    github_com_mercadolibre_fury_platsec-oauth-api_cmd_internal_dtos.OutputResponseDTO:
      type: object
      properties:
        access_token:
          type: string
          example: '{Access token}'
        creation_date:
          type: string
        expires_in:
          type: integer
          example: 21600
        id_token:
          type: string
          description: Output open id
          example: '{JWT token}'
        live_mode:
          type: boolean
          example: true
        public_key:
          type: string
          example: '{public key}'
        refresh_token:
          type: string
          example: '{temporal grant}'
        scope:
          type: string
          example: read write offline_access
        token_type:
          type: string
          example: Bearer
        user_id:
          type: integer
          example: 123456
      description: oauth service response
    github_com_mercadolibre_fury_platsec-oauth-api_cmd_internal_internalerrors.ErrorDescription:
      type: object
      properties:
        cause:
          type: array
          items:
            type: object
        error:
          type: string
          example: invalid_client
        error_description:
          type: string
          example: invalid client_id or client_secret
        status:
          type: integer
          example: 400
      description: Service error response.

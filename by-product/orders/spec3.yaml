openapi: 3.1.0
info:
  title: MercadoPago API
  description: The MercadoPago REST API. Please see https://www.mercadopago.com/developers for more details.
  termsOfService: https://www.mercadopago.com/developers/es/docs/resources/legal/terms-and-conditions
  contact:
    name: MercadoPago Developer Experience
    url: https://www.mercadopago.com/developers
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.mercadopago.com
  description: Production
security:
- bearerAuth: []
tags:
- name: OAuth
  description: Authorization flows for marketplace on-behalf-of and Wallet Connect
  x-mp-sites: &id001
  - MLA
  - MLB
  - MLM
  - MLC
  - MCO
  - MPE
  - MLU
- name: Preferences
  description: Checkout Pro — redirect-based hosted checkout via Preferences
  x-mp-sites: *id001
- name: Payments
  description: Create and manage payment transactions
  x-mp-sites: *id001
- name: Orders
  description: Checkout API via Orders — recommended for new custom checkout integrations
  x-mp-sites: *id001
- name: Merchant Orders
  description: Order containers that group payments for a single purchase
  x-mp-sites: *id001
- name: Customers
  description: Customer profiles and stored payment methods
  x-mp-sites: *id001
- name: Cards
  description: Saved cards and card tokenization
  x-mp-sites: *id001
- name: Addresses
  description: Customer shipping and billing addresses
  x-mp-sites: *id001
- name: Payment Methods
  description: Available payment methods and installment plans per country
  x-mp-sites: *id001
- name: Identification Types
  description: Country-specific identity document type catalog
  x-mp-sites: *id001
- name: Cancellations & Refunds
  description: Cancel payments and create full or partial refunds
  x-mp-sites: *id001
- name: Chargebacks
  description: Chargeback dispute management
  x-mp-sites: *id001
- name: Subscriptions
  description: Recurring payment subscriptions
  x-mp-sites: *id001
- name: Plans
  description: Subscription billing plans
  x-mp-sites: *id001
- name: Invoices
  description: Subscription billing invoices
  x-mp-sites: *id001
- name: Wallet Connect
  description: OAuth-based wallet agreement flows for Wallet Connect
  x-mp-sites:
  - MLA
  - MLB
  - MLM
- name: Stores
  description: Physical store locations
  x-mp-sites: *id001
- name: POS
  description: Point of sale device management
  x-mp-sites: *id001
- name: Terminals
  description: Point hardware terminal management and print actions
  x-mp-sites:
  - MLA
  - MLB
  - MLC
  - MLM
- name: Point Deprecated
  description: Deprecated Point integration APIs — use Terminals and Point Orders instead
  x-mp-sites:
  - MLA
  - MLB
  - MLM
- name: QR Orders
  description: In-store payment orders associated with QR codes
  x-mp-sites:
  - MLA
  - MLB
  - MLC
  - MCO
  - MPE
  - MLU
- name: QR Integrator
  description: Integrator configuration for QR in-store
  x-mp-sites: *id001
- name: QR Deprecated
  description: Deprecated in-store QR order endpoints (V1, V2, Dynamic QR)
  x-mp-sites: *id001
- name: Claims
  description: Post-sale claim details and search
  x-mp-sites: *id001
- name: Claim Messages
  description: Messages and file attachments within a claim
  x-mp-sites: *id001
- name: Claim Resolutions
  description: Mediation requests and expected resolutions
  x-mp-sites: *id001
- name: Claim Shipping
  description: Upload shipping evidence to support a claim
  x-mp-sites: *id001
- name: Releases Report
  description: Generate and schedule releases (settlement) reports
  x-mp-sites: *id001
- name: Settlements Report
  description: Generate and schedule all-transactions reports
  x-mp-sites: *id001
- name: Payouts
  description: Bank transfer and Pix payouts
  x-mp-sites:
  - MLA
  - MLB
  - MLM
  - MLC
paths:
  /v1/orders:
    post:
      operationId: createOrder
      summary: Create an order
      description: 'Creates an Order for processing payment transactions. Supports automatic (single-stage, set processing_mode=automatic)
        and manual (multi-stage, set processing_mode=manual) modes.


        In automatic mode, include the transactions.payments array with the payment method. In manual mode, omit transactions
        and add them later via POST /v1/orders/{id}/transactions, then trigger processing with POST /v1/orders/{id}/process.


        Available for: credit card, debit card, Pix (MLB), Boleto (MLB), OXXO (MLM), SPEI (MLM), PSE (MCO), Rapipago (MLA),
        Pago Fácil (MLA).'
      tags:
      - Orders
      parameters:
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
        description: Unique key per order creation attempt. Prevents duplicate orders on retry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
            examples:
              credit_card:
                summary: Credit card — all countries
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '100.00'
                      payment_method:
                        id: visa
                        type: credit_card
                        token: 1c87b6b301010101ddcd92f9bbbb3be2
                        installments: 1
              pix:
                summary: Pix — Brazil (MLB)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '100.00'
                      expiration_time: P1D
                      payment_method:
                        id: pix
                        type: bank_transfer
              boleto:
                summary: Boleto Bancário — Brazil (MLB)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                    first_name: João
                    last_name: Silva
                    identification:
                      type: CPF
                      number: '99999999999'
                    address:
                      zip_code: '11034430'
                      street_name: Av. Paulista
                      street_number: '100'
                      city: SAO PAULO
                      state: SP
                  transactions:
                    payments:
                    - amount: '100.00'
                      expiration_time: P1D
                      payment_method:
                        id: bolbradesco
                        type: ticket
              oxxo:
                summary: OXXO — Mexico (MLM)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '500.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '500.00'
                      expiration_time: P3D
                      payment_method:
                        id: oxxo
                        type: ticket
              spei:
                summary: SPEI — Mexico (MLM)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '1000.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '1000.00'
                      expiration_time: P1D
                      payment_method:
                        id: clabe
                        type: bank_transfer
              pse:
                summary: PSE — Colombia (MCO)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100000.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                    entity_type: individual
                    first_name: Juan
                    last_name: Pérez
                    identification:
                      type: NIT
                      number: '76262349'
                  transactions:
                    payments:
                    - amount: '100000.00'
                      expiration_time: PT20M
                      payment_method:
                        id: pse
                        type: bank_transfer
                        financial_institution: '1051'
                  config:
                    online:
                      callback_url: https://merchant.com/pse/return
                  additional_info:
                    payer:
                      ip_address: 200.100.50.25
              rapipago:
                summary: Rapipago — Argentina (MLA)
                value:
                  type: online
                  processing_mode: automatic
                  capture_mode: automatic_async
                  total_amount: '5000.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                    identification:
                      type: DNI
                      number: '12345678'
                  transactions:
                    payments:
                    - amount: '5000.00'
                      payment_method:
                        id: rapipago
                        type: ticket
              manual_mode:
                summary: Manual processing mode
                value:
                  type: online
                  processing_mode: manual
                  capture_mode: manual
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '423':
          description: Resource locked — a concurrent request is already processing this order
        '500':
          description: Internal server error
    get:
      operationId: searchOrders
      summary: Search orders
      description: Search for orders using date range and optional filters. begin_date and end_date are required.
      tags:
      - Orders
      parameters:
      - name: begin_date
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Start of date range (ISO 8601)
      - name: end_date
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: End of date range (ISO 8601)
      - name: external_reference
        in: query
        required: false
        schema:
          type: string
      - name: type
        in: query
        required: false
        schema:
          type: string
          enum:
          - online
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - created
          - processed
          - action_required
          - processing
          - canceled
      - name: limit
        in: query
        schema:
          type: integer
          default: 30
          maximum: 100
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/orders/{id}:
    get:
      operationId: getOrder
      summary: Get order by ID
      description: Returns all order information for the given order ID.
      tags:
      - Orders
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Order ID
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/orders/{order_id}/cancel:
    post:
      operationId: cancelOrder
      summary: Cancel an order
      description: Cancels an order and all its transactions. Only orders with status=action_required or status=created can
        be canceled.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Order canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict — order cannot be canceled in its current status
  /v1/orders/{order_id}/process:
    post:
      operationId: processOrder
      summary: Process an order
      description: Triggers processing of an order and all its transactions. Only available for manual-mode orders (processing_mode=manual).
        After calling this endpoint the order transitions to processed or action_required.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Order processing triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict — order already processed or cannot be processed in current status
  /v1/orders/{order_id}/capture:
    post:
      operationId: captureOrder
      summary: Capture an authorized order
      description: Fully captures a previously authorized order (capture_mode=manual). All associated authorized transactions
        are captured in full.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Order captured
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  status_detail:
                    type: string
                  transactions:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict — order cannot be captured in its current status
  /v1/orders/{order_id}/refund:
    post:
      operationId: refundOrder
      summary: Refund an order
      description: Performs a full or partial refund of transactions associated with an order. For a full refund, send an
        empty request body (omit transactions). For a partial refund, include the transactions array with the specific transaction
        IDs and amounts to refund.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRefundRequest'
            examples:
              full_refund:
                summary: Full refund
                value: {}
              partial_refund:
                summary: Partial refund of specific transaction
                value:
                  transactions:
                  - id: transaction_id_here
                    amount: '50.00'
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  status_detail:
                    type: string
                  transactions:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict — order cannot be refunded in its current status
  /v1/orders/{order_id}/transactions/{transaction_id}:
    put:
      operationId: updateOrderTransaction
      summary: Update a transaction on an order
      description: Updates the payment method of a pending transaction on a manual-mode order.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      - name: transaction_id
        in: path
        required: true
        schema:
          type: string
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_method:
                  $ref: '#/components/schemas/OrderPaymentMethod'
      responses:
        '200':
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderTransactionPayment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteOrderTransaction
      summary: Delete a transaction from an order
      description: Removes a transaction from a manual-mode order. Only available before processing.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      - name: transaction_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Transaction deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/orders/{order_id}/transactions:
    post:
      operationId: addOrderTransaction
      summary: Add a transaction to an order
      description: Adds a payment transaction to an order. Only available when processing_mode=manual. The order must be in
        status=created.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - payments
              properties:
                payments:
                  type: array
                  items:
                    $ref: '#/components/schemas/OrderPayment'
      responses:
        '201':
          description: Transaction added
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderTransactionPayment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: Public key for client-side card tokenization via MercadoPago.js only. Never use for server-side calls.
    mercadopagoOAuth:
      type: oauth2
      description: OAuth 2.0 authorization_code flow for marketplace on-behalf-of and Wallet Connect integrations. For client_credentials
        and refresh_token, use POST /oauth/token directly with the appropriate grant_type.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded — wait before retrying
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 429
            error: too_many_requests
            message: Rate limit exceeded. Retry after the indicated number of seconds.
  schemas:
    OrderRequest:
      type: object
      required:
      - type
      - total_amount
      - transactions
      - payer
      description: 'Request body to create an Order. Supports automatic (single-stage) and manual (multi-stage) processing
        modes. Use processing_mode=automatic for most integrations.

        '
      properties:
        type:
          type: string
          enum:
          - online
          description: Order type. Only "online" is supported for online payments.
          example: online
        processing_mode:
          type: string
          enum:
          - automatic
          - manual
          description: 'automatic — MP processes all transactions immediately in a single stage. manual — transactions are
            processed in configurable stages; use the /process endpoint to trigger processing after creation.

            '
          example: automatic
        capture_mode:
          type: string
          enum:
          - automatic
          - manual
          - automatic_async
          description: 'automatic — authorize and capture funds at the same time. manual — authorize only (reserve funds);
            capture later with /capture endpoint. automatic_async — order may remain in status=processing while awaiting async
            update; final status delivered via webhook.

            '
          example: automatic
        total_amount:
          type: string
          description: 'Total amount to be paid as a decimal string. Must equal the sum of all payment transaction amounts.
            Example: "100.00".

            '
          example: '100.00'
        external_reference:
          type: string
          description: Your internal order reference ID. Returned in all order responses.
          example: ORDER-2024-001234
        description:
          type: string
          description: Description of the purchased product or service.
          example: Premium subscription
        payer:
          $ref: '#/components/schemas/OrderPayer'
        transactions:
          $ref: '#/components/schemas/OrderTransactions'
        config:
          $ref: '#/components/schemas/OrderConfig'
        items:
          type: array
          description: Items included in the order.
          items:
            $ref: '#/components/schemas/OrderItem'
        shipment:
          $ref: '#/components/schemas/OrderShipment'
        additional_info:
          type: object
          description: Additional information required for specific payment methods (e.g. PSE).
          properties:
            payer:
              type: object
              properties:
                ip_address:
                  type: string
                  description: IP address of the payer. Required for PSE payments.
                  example: 200.100.50.25
        integration_data:
          type: object
          description: Integration metadata used by MercadoPago internally.
          properties:
            platform_id:
              type: string
            sponsor_id:
              type: integer
    OrderTransactions:
      type: object
      description: Payment transactions for this order. Currently supports one transaction.
      properties:
        payments:
          type: array
          description: 'Payment transaction(s). Required when processing_mode=automatic. Must not be present when processing_mode=manual
            (add via POST /orders/{id}/transactions).

            '
          items:
            $ref: '#/components/schemas/OrderPayment'
    OrderPayment:
      type: object
      required:
      - amount
      - payment_method
      properties:
        amount:
          type: string
          description: Transaction amount as a decimal string.
          example: '100.00'
        payment_method:
          $ref: '#/components/schemas/OrderPaymentMethod'
        expiration_time:
          type: string
          description: 'Transaction expiration in ISO 8601 duration format (e.g. "P1D" = 1 day, "PT20M" = 20 minutes). Applies
            to ticket and bank transfer payment methods.

            '
          example: P1D
        date_of_expiration:
          type: string
          format: date-time
          description: Absolute expiration date-time. Takes precedence over expiration_time if both provided.
    OrderPaymentMethod:
      type: object
      required:
      - id
      - type
      description: 'Payment method for the transaction. Use GET /v1/payment_methods to list available methods for your site.

        '
      properties:
        id:
          type: string
          description: 'Payment method identifier. Examples by type: Cards: visa, master, elo, hipercard, amex. Ticket/cash:
            bolbradesco (Boleto), oxxo, rapipago, pagofacil. Bank transfer: pix, clabe (SPEI), pse.

            '
          example: visa
        type:
          type: string
          enum:
          - credit_card
          - debit_card
          - bank_transfer
          - ticket
          - digital_wallet
          - account_money
          example: credit_card
        token:
          type: string
          description: Card token. Required for credit_card and debit_card types.
          example: 1c87b6b301010101ddcd92f9bbbb3be2
        installments:
          type: integer
          description: Number of installments. Use 1 for no installments.
          minimum: 1
          example: 1
        statement_descriptor:
          type: string
          description: Text shown on payer's card statement. Maximum 50 characters.
          maxLength: 50
        financial_institution:
          type: string
          description: Bank code. Required for PSE (Colombia) bank transfer payments.
          example: '1051'
    OrderPayer:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
          example: customer@example.com
        first_name:
          type: string
        last_name:
          type: string
        identification:
          type: object
          properties:
            type:
              type: string
              description: Document type (e.g. CPF, CNPJ, DNI, NIT, RFC)
              example: CPF
            number:
              type: string
              description: Document number (digits only, no formatting)
              example: '99999999999'
        phone:
          type: object
          properties:
            area_code:
              type: string
              example: '11'
            number:
              type: string
              example: '43434343'
        address:
          type: object
          properties:
            zip_code:
              type: string
            street_name:
              type: string
            street_number:
              type: string
            neighborhood:
              type: string
            city:
              type: string
            state:
              type: string
            complement:
              type: string
        entity_type:
          type: string
          enum:
          - individual
          - association
          description: Payer entity type. Required for PSE (Colombia) payments.
    OrderConfig:
      type: object
      description: Optional settings for the order.
      properties:
        online:
          type: object
          description: Settings for online card transactions.
          properties:
            transaction_security:
              type: object
              description: '3DS (3D Secure) configuration. After creating the order, the response indicates if a challenge
                is required via transactions.payments[].payment_method.transaction_security.

                '
              properties:
                validation:
                  type: string
                  enum:
                  - supported
                  - required
                  - never
                  description: 'supported — run 3DS when supported by issuer; required — always run 3DS, reject if not supported;
                    never — skip 3DS entirely.

                    '
                liability_shift:
                  type: string
                  enum:
                  - required
                  - not_required
                  description: 'Required when validation is not "never". required — only approve if liability shifts to issuer;
                    not_required — approve regardless of liability shift outcome.

                    '
            callback_url:
              type: string
              format: uri
              description: Redirect URL after PSE bank authentication completes.
              example: https://merchant.com/pse/return
    OrderItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: float
        category_id:
          type: string
    OrderShipment:
      type: object
      properties:
        address:
          type: object
          properties:
            zip_code:
              type: string
            street_name:
              type: string
            street_number:
              type: string
            neighborhood:
              type: string
            city:
              type: string
            state:
              type: string
            complement:
              type: string
    Order:
      type: object
      description: A MercadoPago Order.
      properties:
        id:
          type: string
          description: Order unique identifier, automatically generated by MercadoPago.
          example: 01JG28GRB9NYTG6VVS3R5N58YT
        type:
          type: string
          example: online
        processing_mode:
          type: string
          enum:
          - automatic
          - manual
        capture_mode:
          type: string
          enum:
          - automatic
          - manual
          - automatic_async
        status:
          type: string
          enum:
          - created
          - processed
          - action_required
          - processing
          - canceled
          description: 'created — order created, waiting for processing. processed — all transactions successfully processed.
            action_required — integrator action needed (e.g. capture an authorized payment). processing — being processed;
            no action needed from integrator. canceled — order canceled, will not be processed further.

            '
          example: processed
        status_detail:
          type: string
          enum:
          - created
          - accredited
          - in_process
          - in_review
          - waiting_payment
          - waiting_capture
          - waiting_transfer
          description: 'accredited — payment credited; waiting_payment — waiting for payer to complete offline payment; waiting_capture
            — authorized payment awaiting capture; waiting_transfer — waiting for bank transfer.

            '
          example: accredited
        external_reference:
          type: string
        total_amount:
          type: string
          description: Total order amount as decimal string.
          example: '100.00'
        total_paid_amount:
          type: string
          description: Total amount effectively paid so far.
          example: '100.00'
        description:
          type: string
        country_code:
          type: string
          description: site_id of the order (e.g. MLB, MLA).
          example: MLB
        user_id:
          type: integer
          description: Collector (seller) user ID.
        created_date:
          type: string
          format: date-time
        last_updated_date:
          type: string
          format: date-time
        client_token:
          type: string
          description: 'Token for client-side rendering of the payment UI (e.g. Bricks). Only returned when applicable.

            '
        payer:
          $ref: '#/components/schemas/OrderPayer'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        shipment:
          $ref: '#/components/schemas/OrderShipment'
        transactions:
          type: object
          properties:
            payments:
              type: array
              items:
                $ref: '#/components/schemas/OrderTransactionPayment'
        config:
          $ref: '#/components/schemas/OrderConfig'
        integration_data:
          type: object
    OrderTransactionPayment:
      type: object
      properties:
        id:
          type: string
          description: Transaction ID, automatically generated by MercadoPago.
        amount:
          type: string
          description: Transaction amount.
          example: '100.00'
        paid_amount:
          type: string
          description: Amount effectively paid.
        reference_id:
          type: string
          description: External reference for this transaction.
        status:
          type: string
          enum:
          - created
          - processed
          - action_required
          - processing
          description: 'created — transaction created; processed — transaction successfully processed; action_required — integrator
            must act (e.g. capture); processing — awaiting asynchronous result.

            '
        status_detail:
          type: string
          enum:
          - accredited
          - waiting_capture
          - created
          - pending_review_manual
          - in_process
        date_of_expiration:
          type: string
          format: date-time
        expiration_time:
          type: string
          description: Expiration duration in ISO 8601 format.
        payment_method:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            token:
              type: string
            installments:
              type: integer
            statement_descriptor:
              type: string
            ticket_url:
              type: string
              format: uri
              description: URL to view or print the ticket (Boleto, OXXO, etc.).
            barcode_content:
              type: string
              description: Barcode string for offline payment methods.
            reference:
              type: string
              description: Reference number for offline payment methods.
            verification_code:
              type: string
            financial_institution:
              type: string
            redirect_url:
              type: string
              format: uri
              description: 'Redirect URL for PSE bank transfer (Colombia). In production, redirect the payer to this URL to
                complete authentication at their bank.

                '
            digitable_line:
              type: string
              description: Digitable line for Boleto payments.
            qr_code:
              type: string
              description: QR code string for Pix payments.
            qr_code_base64:
              type: string
              description: QR code image as Base64 for Pix payments.
            e2e_id:
              type: string
              description: End-to-end identifier for Pix transactions (mandatory tracking code).
            transaction_security:
              type: object
              description: 3DS challenge result.
              properties:
                status:
                  type: string
                  enum:
                  - pending
                  - success
                  - failed
                redirect_url:
                  type: string
                  format: uri
                  description: URL to redirect payer to complete 3DS challenge (when status=pending).
    OrderRefundRequest:
      type: object
      description: 'Refund request for an order. Omit transactions for a full refund. Include specific transaction amounts
        for partial refunds.

        '
      properties:
        transactions:
          type: array
          description: Transactions to refund. Omit for full order refund.
          items:
            type: object
            properties:
              id:
                type: string
                description: Transaction ID to refund.
              amount:
                type: string
                description: Amount to refund. Omit for full transaction refund.
    OrderSearchResult:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        paging:
          type: object
          properties:
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer

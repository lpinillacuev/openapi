paths:
  /v1/payment_methods:
    get:
      operationId: listPaymentMethods
      summary: List available payment methods
      description: >-
        Returns all payment methods available for the credential's site_id. Use this to build payment method selectors
        and validate method availability before attempting a payment.
      tags:
        - Payment Methods
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payment methods list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    payment_type_id:
                      type: string
                    status:
                      type: string
                      enum:
                        - active
                        - deactivated
                    secure_thumbnail:
                      type: string
                      format: uri
                    thumbnail:
                      type: string
                      format: uri
                    deferred_capture:
                      type: string
                      enum:
                        - supported
                        - unsupported
                        - does_not_apply
                    settings:
                      type: object
                      description: Card settings (bin ranges, security codes, card length).
                    additional_info_needed:
                      type: array
                      items:
                        type: string
                      description: Additional fields required at checkout.
                    min_allowed_amount:
                      type: number
                      format: float
                    max_allowed_amount:
                      type: number
                      format: float
                    accreditation_time:
                      type: integer
                    financial_institutions:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                          description:
                            type: string
                    processing_modes:
                      type: array
                      items:
                        type: string
                        enum:
                          - aggregator
                          - gateway
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      consumes:
        - application/json
      description: create payment method configuration
      parameters:
        - description: Payment Method Configuration
          in: body
          name: data
          required: true
          schema:
            $ref: '#/definitions/dtos.PaymentMethodConfigurationInputCreate'
      produces:
        - application/json
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/dtos.PaymentMethodConfigurationOutput'
        '400':
          description: Bad Request
          schema: {}
        '404':
          description: Not Found
          schema: {}
        '500':
          description: Internal Server Error
          schema: {}
      summary: Create Payment Method Configuration
      tags:
        - Payment Method Configuration
  /v1/payment_methods/installments:
    get:
      operationId: getInstallments
      summary: Get installment options
      description: >-
        Returns available installment plans for a given card BIN, amount, and site. Use this to populate installment
        selectors in your checkout.
      tags:
        - Payment Methods
      security:
        - bearerAuth: []
      parameters:
        - name: payment_method_id
          in: query
          required: true
          schema:
            type: string
          example: visa
        - name: amount
          in: query
          required: true
          schema:
            type: number
            format: float
          example: 1000
        - name: issuer_id
          in: query
          schema:
            type: string
        - name: bin
          in: query
          schema:
            type: string
          description: First 6 digits of the card (BIN) for more accurate installment pricing
          example: '411111'
      responses:
        '200':
          description: Installment options
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    payment_method_id:
                      type: string
                    payment_type_id:
                      type: string
                    issuer:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                    payer_costs:
                      type: array
                      items:
                        type: object
                        properties:
                          installments:
                            type: integer
                          installment_rate:
                            type: number
                            format: float
                          discount_rate:
                            type: number
                            format: float
                          reimbursement_rate:
                            type: number
                            format: float
                          labels:
                            type: array
                            items:
                              type: string
                          total_amount:
                            type: number
                            format: float
                          installment_amount:
                            type: number
                            format: float
    post:
      consumes:
        - application/json
      description: create or update
      parameters:
        - description: Installment
          in: body
          name: data
          required: true
          schema:
            $ref: '#/definitions/dtos.Installment'
      produces:
        - application/json
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/dtos.Installment'
        '400':
          description: Bad Request
          schema: {}
        '404':
          description: Not Found
          schema: {}
        '500':
          description: Internal Server Error
          schema: {}
      summary: Create or Update Installment
      tags:
        - Installment

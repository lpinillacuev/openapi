openapi: 3.1.0
info:
  title: MercadoPago API
  description: The MercadoPago REST API. Please see https://www.mercadopago.com/developers for more details.
  termsOfService: https://www.mercadopago.com/developers/es/docs/resources/legal/terms-and-conditions
  contact:
    name: MercadoPago Developer Experience
    url: https://www.mercadopago.com/developers
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.mercadopago.com
  description: Production
security:
- bearerAuth: []
tags:
- name: OAuth
  description: Authorization flows for marketplace on-behalf-of and Wallet Connect
  x-mp-sites: &id001
  - MLA
  - MLB
  - MLM
  - MLC
  - MCO
  - MPE
  - MLU
- name: Preferences
  description: Checkout Pro — redirect-based hosted checkout via Preferences
  x-mp-sites: *id001
- name: Payments
  description: Create and manage payment transactions
  x-mp-sites: *id001
- name: Orders
  description: Checkout API via Orders — recommended for new custom checkout integrations
  x-mp-sites: *id001
- name: Merchant Orders
  description: Order containers that group payments for a single purchase
  x-mp-sites: *id001
- name: Customers
  description: Customer profiles and stored payment methods
  x-mp-sites: *id001
- name: Cards
  description: Saved cards and card tokenization
  x-mp-sites: *id001
- name: Addresses
  description: Customer shipping and billing addresses
  x-mp-sites: *id001
- name: Payment Methods
  description: Available payment methods and installment plans per country
  x-mp-sites: *id001
- name: Identification Types
  description: Country-specific identity document type catalog
  x-mp-sites: *id001
- name: Cancellations & Refunds
  description: Cancel payments and create full or partial refunds
  x-mp-sites: *id001
- name: Chargebacks
  description: Chargeback dispute management
  x-mp-sites: *id001
- name: Subscriptions
  description: Recurring payment subscriptions
  x-mp-sites: *id001
- name: Plans
  description: Subscription billing plans
  x-mp-sites: *id001
- name: Invoices
  description: Subscription billing invoices
  x-mp-sites: *id001
- name: Wallet Connect
  description: OAuth-based wallet agreement flows for Wallet Connect
  x-mp-sites:
  - MLA
  - MLB
  - MLM
- name: Stores
  description: Physical store locations
  x-mp-sites: *id001
- name: POS
  description: Point of sale device management
  x-mp-sites: *id001
- name: Terminals
  description: Point hardware terminal management and print actions
  x-mp-sites:
  - MLA
  - MLB
  - MLC
  - MLM
- name: Point Deprecated
  description: Deprecated Point integration APIs — use Terminals and Point Orders instead
  x-mp-sites:
  - MLA
  - MLB
  - MLM
- name: QR Orders
  description: In-store payment orders associated with QR codes
  x-mp-sites:
  - MLA
  - MLB
  - MLC
  - MCO
  - MPE
  - MLU
- name: QR Integrator
  description: Integrator configuration for QR in-store
  x-mp-sites: *id001
- name: QR Deprecated
  description: Deprecated in-store QR order endpoints (V1, V2, Dynamic QR)
  x-mp-sites: *id001
- name: Claims
  description: Post-sale claim details and search
  x-mp-sites: *id001
- name: Claim Messages
  description: Messages and file attachments within a claim
  x-mp-sites: *id001
- name: Claim Resolutions
  description: Mediation requests and expected resolutions
  x-mp-sites: *id001
- name: Claim Shipping
  description: Upload shipping evidence to support a claim
  x-mp-sites: *id001
- name: Releases Report
  description: Generate and schedule releases (settlement) reports
  x-mp-sites: *id001
- name: Settlements Report
  description: Generate and schedule all-transactions reports
  x-mp-sites: *id001
- name: Payouts
  description: Bank transfer and Pix payouts
  x-mp-sites:
  - MLA
  - MLB
  - MLM
  - MLC
paths:
  /checkout/preferences:
    post:
      operationId: createPreference
      summary: Create a preference
      description: "Creates a Checkout Pro preference. The response contains `init_point` (production) and \n**Webhook events\
        \ triggered:** payment, merchant_order"
      tags:
      - Preferences
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceRequest'
            examples:
              simple:
                summary: Simple one-item preference
                value:
                  items:
                  - title: Premium Plan
                    quantity: 1
                    unit_price: 99.9
                  payer:
                    email: customer@example.com
                  back_urls:
                    success: https://mystore.com/success
                    failure: https://mystore.com/failure
                    pending: https://mystore.com/pending
                  auto_return: approved
      responses:
        '201':
          description: Preference created
          content: &id002
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          description: Preference created
          content: *id002
  /checkout/preferences/{id}:
    get:
      operationId: getPreference
      summary: Get preference by ID
      tags:
      - Preferences
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Preference found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      operationId: updatePreference
      summary: Update a preference
      tags:
      - Preferences
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceRequest'
      responses:
        '200':
          description: Preference updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
        '400':
          $ref: '#/components/responses/BadRequest'
  /checkout/preferences/search:
    get:
      operationId: searchPreferences
      summary: Search preferences
      tags:
      - Preferences
      security:
      - bearerAuth: []
      parameters:
      - name: external_reference
        in: query
        schema:
          type: string
      - name: marketplace
        in: query
        schema:
          type: string
      - name: site_id
        in: query
        schema:
          type: string
      - name: sponsor_id
        in: query
        schema:
          type: integer
      - name: limit
        in: query
        schema:
          type: integer
          default: 30
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  elements:
                    type: array
                    items:
                      $ref: '#/components/schemas/Preference'
                  paging:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: Public key for client-side card tokenization via MercadoPago.js only. Never use for server-side calls.
    mercadopagoOAuth:
      type: oauth2
      description: OAuth 2.0 authorization_code flow for marketplace on-behalf-of and Wallet Connect integrations. For client_credentials
        and refresh_token, use POST /oauth/token directly with the appropriate grant_type.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
  responses:
    SearchOrdersBadRequest:
      description: Bad request - invalid search parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            MissingRequiredParameters:
              $ref: '#/components/examples/MissingRequiredParameters'
            InvalidDateFormat:
              $ref: '#/components/examples/InvalidDateFormat'
    SearchOrders:
      description: Successful search operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchOrdersResponse'
          examples:
            SearchOrdersSuccess:
              $ref: '#/components/examples/SearchOrdersSuccess'
    SimulateOrderEventNotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            OrderNotFound:
              $ref: '#/components/examples/OrderNotFound'
    ForbiddenError:
      description: Forbidden. Returned either when the caller lacks permission to access the resource, or when the caller's
        account is blocked and its API keys have been revoked.
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/Error'
            - $ref: '#/components/schemas/PolicyAgentBlockedError'
          examples:
            InvalidUserPermission:
              $ref: '#/components/examples/PermissionDeniedAccessResource'
            AccountBlockedByPolicyAgent:
              $ref: '#/components/examples/AccountBlockedByPolicyAgent'
    SimulateOrderBadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            InvalidStatusTransition:
              $ref: '#/components/examples/InvalidStatusTransition'
            InvalidPathParam:
              $ref: '#/components/examples/PathParamOrderID'
            RequiredPropertiesError:
              $ref: '#/components/examples/RequiredPropertiesError'
            UnsupportedPropertiesError:
              $ref: '#/components/examples/UnsupportedPropertiesError'
            MinimumPropertiesError:
              $ref: '#/components/examples/MinimumPropertiesError'
            PropertyTypeError:
              $ref: '#/components/examples/PropertyTypeError'
            PropertyValueError:
              $ref: '#/components/examples/PropertyValueError'
            MaximumItemsError:
              $ref: '#/components/examples/MaximumItemsError'
            MinimumItemsError:
              $ref: '#/components/examples/MinimumItemsError'
            InvalidPropertiesError:
              $ref: '#/components/examples/InvalidPropertiesError'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            InternalServerError:
              $ref: '#/components/examples/InternalServerError'
            IdempotencyValidationFailedError:
              $ref: '#/components/examples/IdempotencyValidationFailedError'
    PostTransactionBadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            RequireIdempotencyHeader:
              $ref: '#/components/examples/RequireIdempotencyHeader'
            InvalidSizeIdempotencyKey:
              $ref: '#/components/examples/InvalidSizeIdempotencyHeader'
            PathParamOrderID:
              $ref: '#/components/examples/PathParamOrderID'
            TransactionLimitOnOrder:

paths:
  /checkout/preferences:
    post:
      tags:
        - Preference
      summary: Create a Preference
      parameters:
        - name: callerID
          in: query
          description: Not necessary if Access Token is passed
          required: false
          style: form
          explode: true
          schema:
            type: integer
        - name: AccessToken
          in: query
          description: Not necessary if Caller ID is passed
          required: false
          style: form
          explode: true
          schema:
            type: string
      requestBody:
        description: Preference
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/http.Preference'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/http.Preference'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
      x-codegen-request-body-name: Pref
  /checkout/preferences/{id}:
    get:
      tags:
        - Preference
      summary: Get a Preference
      description: View all payment information for a product or service with the desired preference ID.
      parameters:
        - name: id
          in: path
          description: Preference ID
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: callerID
          in: query
          description: Not necessary if Access Token is passed
          required: false
          style: form
          explode: true
          schema:
            type: integer
        - name: AccessToken
          in: query
          description: Not necessary if Caller ID is passed
          required: false
          style: form
          explode: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Preference'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
    put:
      tags:
        - Preference
      summary: Update a Preference
      description: >-
        Update the details of a payment preference. Enter the preference ID and submit the information you wish to
        update.
      parameters:
        - name: id
          in: path
          description: Preference ID
          required: true
          style: simple
          explode: false
          schema:
            type: integer
        - name: callerID
          in: query
          description: Not necessary if Access Token is passed
          required: false
          style: form
          explode: true
          schema:
            type: integer
        - name: AccessToken
          in: query
          description: Not necessary if Caller ID is passed
          required: false
          style: form
          explode: true
          schema:
            type: string
      requestBody:
        description: Preference
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/http.Preference'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/http.Preference'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
      x-codegen-request-body-name: Pref
  /checkout/preferences/search:
    get:
      tags:
        - Preference
      summary: Search Preferences
      description: Returns a list of preferences based on a search query.
      parameters:
        - in: query
          name: query
          description: Query string to filter preferences.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A list of preferences matching the search query.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    options:
      tags:
        - Preference
      summary: Get the options
      description: This will show an example of the responses of all the endpoints
      responses:
        '200':
          description: This will get an example of the GET, CREATE and UPDATE methods
          content:
            application/json:
              schema:
                type: string
  /checkout/preferences/{id}/expire:
    put:
      tags:
        - Preference
      summary: Expires a Preference
      description: Expires a payment preference. Enter the preference ID and it will be expired.
      parameters:
        - name: id
          in: path
          description: Preference ID
          required: true
          style: simple
          explode: false
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/http.Preference'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PrefError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: Public key for client-side card tokenization via MercadoPago.js only. Never use for server-side calls.
    mercadopagoOAuth:
      type: oauth2
      description: >-
        OAuth 2.0 authorization_code flow for marketplace on-behalf-of and Wallet Connect integrations. For
        client_credentials and refresh_token, use POST /oauth/token directly with the appropriate grant_type.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded — wait before retrying
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 429
            error: too_many_requests
            message: Rate limit exceeded. Retry after the indicated number of seconds.
  schemas:
    github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Address:
      type: object
      properties:
        city:
          type: string
        federal_unit:
          type: string
        neighborhood:
          type: string
        street_name:
          type: string
        street_number:
          type: string
        zip_code:
          type: string
    github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Amount:
      type: object
      properties:
        collector:
          $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.AmountValues'
        payer:
          $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.AmountValues'
    github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.AmountValues:
      type: object
      properties:
        currency_id:
          type: string
        transaction:
          type: number
    github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Collector:
      type: object
      properties:
        operator_id:
          type: number
          description: Can be null
        tags:
          type: array
          items:
            type: string
    github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.CounterCurrency:
      type: object
      properties:
        currency_id:
          type: string
    github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.DeductionsByInstallment:

                        - AGTOT
                        - AGPSS
                      bank_service_code:
                        type: string
        config:
          type: object
          minProperties: 1
          required:
          - qr
          properties:
            qr:
              type: object
              minProperties: 1
              required:
              - external_pos_id
              properties:
                external_pos_id:
                  type: string
                  minLength: 1
                  maxLength: 40
                mode:
                  type: string
                  enum:
                  - static
                  - dynamic
                  - hybrid
            payment_method:
              type: object
              properties:
                default_type:
                  type: string
                  examples:
                  - credit_card
                installments_cost:
                  type: string
                  examples:
                  - seller
                installments:
                  type: object
                  properties:
                    interest_free:
                      type: object
                      properties:
                        type:
                          type: string
                          examples:
                          - range
                        values:
                          type: array
                          items:
                            type: integer
                          examples:
                          - - 1
                          - 6
                    available:
                      type: object
                      properties:
                        type:
                          type: string
                          examples:
                          - all
        total_amount:
          type: string
          minLength: 1
          maxLength: 32
          pattern: ^[0-9]+([.][0-9]{2,2})+?$
          examples:
          - '1234.56'
        processing_mode:
          type: string
          enum:
          - manual
          - automatic
          - automatic_async
          default: automatic
        description:
          type: string
          minLength: 1
          maxLength: 150
        items:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: object

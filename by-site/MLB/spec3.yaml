          type: string
          format: date-time
        last_updated:
          type: string
          format: date-time
        resource:
          type: string
          enum:
          - payment
          - shipment
          - order
          description: Resource type the claim is about
        reason_id:
          type: string
          description: Reason code for the claim
        players:
          type: array
          description: Parties involved (buyer, seller)
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                - complainant
                - respondent
              user_id:
                type: integer
              available_actions:
                type: array
                items:
                  type: string

  parameters:
    SortOrder:
      name: sort_order
      in: query
      required: false
      schema:
        type: string
        enum:
        - asc
        - desc
        default: desc
      description: Sort order
    SortBy:
      name: sort_by
      in: query
      required: false
      schema:
        type: string
        enum:
        - created_date
        - last_updated_date
        default: created_date
      description: Field to sort by
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of items per page
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination
    PaymentMethodType:
      name: payment_method_type
      in: query
      required: false
      schema:
        type: string
        maxLength: 20
        pattern: ^[a-zA-Z0-9_-]+$
      description: Payment method type to filter by
    PaymentMethodID:
      name: payment_method_id
      in: query
      required: false
      schema:
        type: string
        maxLength: 20
        pattern: ^[a-zA-Z0-9_-]+$
      description: Payment method ID to filter by
    StatusDetail:
      name: status_detail
      in: query
      required: false
      schema:
        type: string
        enum:
        - created
        - accredited
        - partially_refunded
        - refunded
        - canceled
        - expired
        - in_process
        - settled
        - reimbursed
        - waiting_payment
        - waiting_capture
        - waiting_transfer
        - pending_challenge
        - pending_review_manual
        - check_on_terminal
        - failed
        - at_terminal
        - in_review
      description: Detailed status to filter by
    OrderStatus:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
        - created
        - in_review
        - action_required
        - processing
        - processed
        - failed
        - canceled
        - expired
        - refunded
        - charged_back
        - at_terminal
      description: Order status to filter by
    OrderType:
      name: type
      in: query
      required: false
      schema:
        type: string
        enum:
        - online
        - point
        - qr
      description: Order type to filter by
    ExternalReference:
      name: external_reference
      in: query
      required: false
      schema:
        type: string
      description: External reference ID to filter orders
    EndDate:
      name: end_date
      in: query
      required: true
      schema:
        type: string
        format: date-time
      description: End date for filtering orders (RFC3339 format). The range between begin_date and end_date must be less
        than 30 days.
      example: '2023-01-29T23:59:59Z'
    BeginDate:
      name: begin_date
      in: query
      required: true
      schema:
        type: string
        format: date-time
      description: Start date for filtering orders (RFC3339 format). The range between begin_date and end_date must be less
        than 30 days.
      example: '2023-01-01T00:00:00Z'
    XProductID:
      name: X-Product-Id
      in: header
      schema:
        type: string
      required: true
      description: Product ID for the request
      x-visibility: partner
    XIdempotencyKey:
      name: X-Idempotency-Key
      in: header
      schema:
        type: string
      required: true
      description: Idempotency key for the request
    TransactionID:
      name: transaction_id
      in: path
      description: Transaction id
      required: true
      schema:
        type: string
    OrderID:
      name: order_id
      in: path
      description: Order id
      required: true
      schema:
        type: string

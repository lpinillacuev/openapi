      value:
        errors:
        - code: minimum_items
          message: The minimum number of items for some property was not sent. Check the message returned in the error details
            to find out what the problem was and try again.
          details:
          - $.items - minimum 1 items required, but found 0 items
    MaximumItemsError:
      summary: Maximum items exceeded
      description: A greater number of items were sent than allowed for some property. Check the message returned in the error
        details to find out what the problem was and try again.
      value:
        errors:
        - code: maximum_items
          message: Maximum items
          details:
          - $.transactions.payments - maximum 1 items required, but found 2 items
    PropertyValueError:
      summary: Incorrect property value

              format: duration
              pattern: ^P(?:\d+Y)?(?:\d+M)?(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+S)?)?$
              description: Default ISO 8601 expiration duration applied to payments without an individual expiration_time.

    OrderPointRequest:
      description: Order request for type=point
      required:
      - type
      - external_reference
      - transactions
      - config
      - description
      properties:
        type:
          type: string
          enum:
          - point
        external_reference:
          type: string
          description: Unique identifier for this order in the merchant's system. Accepts letters (a-z, A-Z), numbers (0-9),
            hyphens (-), and underscores (_).
          minLength: 1
          maxLength: 150
          pattern: ^([a-zA-Z0-9\-_]+)$
          examples:
          - ext_ref_1234
        taxes:
          type: array
          minItems: 1
          description: This field is only available for site MLC
          items:
            type: object
            minProperties: 1
            required:
            - payer_condition
            properties:
              payer_condition:
                type: string
                enum:
                - payment_exempt_iva
                - payment_taxable_iva
              value:
                type: string
              type:
                type: string
        transactions:
          type: object
          minProperties: 1
          properties:
            payments:
              type: array
              minItems: 1
              maxItems: 1
              items:
                type: object
                minProperties: 1
                required:
                - amount
                properties:
                  amount:
                    type: string
                    minLength: 1
                    maxLength: 18
                    pattern: ^\d+(\.\d{1,2})?$
                    examples:
                    - '123.45'
        config:
          type: object
          minProperties: 1
          properties:
            point:
              type: object
              minProperties: 1
              properties:
                terminal_id:
                  type: string
                  minLength: 5
                  maxLength: 50
                  pattern: ^(GERTEC_MP35P|INGENICO_MOVE2500|PAX_A910|NEWLAND_N950)__[a-zA-Z0-9]+$
                print_on_terminal:
                  type: string
                  enum:
                  - seller_ticket
                  - no_ticket
                  default: seller_ticket
                ticket_number:
                  type: string
                  minLength: 1
                  maxLength: 20
                screen_time:
                  type: string
                  format: duration
                  minLength: 2
                  maxLength: 30
                  pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
                  description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
                  examples:
                  - P1D
                congrats_time:
                  type: string
                  format: duration
                  minLength: 2
                  maxLength: 30
                  pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
                  description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
                  examples:
                  - P1D
            payment_method:
              type: object
              minProperties: 1
              properties:
                default_type:
                  type: string
                  enum:
                  - credit_card
                  - debit_card
                  - prepaid_card
                default_installments:
                  type: integer
                  minimum: 1
                installments_cost:
                  type: string
        description:
          type: string
          minLength: 1
          maxLength: 150
        expiration_time:
          type: string
          format: duration
          minLength: 2
          maxLength: 30
          pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
          description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
          examples:
          - P1D

        date_created:
          type: string
          format: date-time
        last_updated:
          type: string
          format: date-time
        total_amount:
          type: number
          format: float
        expires:
          type: boolean
        expiration_date_from:
          type: string
          format: date-time
        expiration_date_to:
          type: string
          format: date-time
        collector_id:
          type: integer
        client_id:
          type: string
        marketplace:
          type: string
        marketplace_fee:
          type: number
          format: float
    Claim:
      type: object
      description: A post-sale claim (dispute) between buyer and seller
      properties:
        id:
          type: integer
          description: Claim unique identifier
          example: 4567890123
        type:
          type: string
          enum:
          - mediations
          - claims
          description: mediations — buyer-initiated dispute requiring MP mediation; claims — seller-initiated claim
        stage:
          type: string
          enum:
          - claim
          - dispute
          - resolution
          description: Current stage in the dispute lifecycle
        status:
          type: string
          enum:
          - opened
          - closed
          - cancelled

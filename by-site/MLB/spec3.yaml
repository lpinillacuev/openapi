components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: Public key for client-side card tokenization via MercadoPago.js only. Never use for server-side calls.
    mercadopagoOAuth:
      type: oauth2
      description: OAuth 2.0 authorization_code flow for marketplace on-behalf-of and Wallet Connect integrations. For client_credentials
        and refresh_token, use POST /oauth/token directly with the appropriate grant_type.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
  responses:
    SearchOrdersBadRequest:
      description: Bad request - invalid search parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            MissingRequiredParameters:
              $ref: '#/components/examples/MissingRequiredParameters'
            InvalidDateFormat:
              $ref: '#/components/examples/InvalidDateFormat'
    SearchOrders:
      description: Successful search operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchOrdersResponse'
          examples:
            SearchOrdersSuccess:
              $ref: '#/components/examples/SearchOrdersSuccess'
    SimulateOrderEventNotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            OrderNotFound:
              $ref: '#/components/examples/OrderNotFound'
    ForbiddenError:
      description: Forbidden. Returned either when the caller lacks permission to access the resource, or when the caller's
        account is blocked and its API keys have been revoked.
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/Error'
            - $ref: '#/components/schemas/PolicyAgentBlockedError'
          examples:
            InvalidUserPermission:
              $ref: '#/components/examples/PermissionDeniedAccessResource'
            AccountBlockedByPolicyAgent:
              $ref: '#/components/examples/AccountBlockedByPolicyAgent'
    SimulateOrderBadRequest:
      description: Bad request.
      content:

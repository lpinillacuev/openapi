    IdempotencyValidationFailedError:
      summary: Idempotency validation failed
      description: Validation fail. Please try submitting the request again.
      value:
        errors:
        - code: idempotency_validation_failed
          message: Validation fail. Please try submitting the request again.
    OrderAlreadyCancelledError:
      summary: Order already canceled
      description: The order has already been canceled.
      value:
        errors:
        - code: order_already_canceled
          message: The order has already been canceled.
    OperationNotSupportedError:
      summary: Operation not supported
      description: The operation is not supported for this order. Please check the order "status" and "status_detail" and
        try again.
      value:
        errors:
        - code: operation_not_supported
          message: The operation is not supported for this order. Please check the order "status" and "status_detail" and
            try again.
    CannotCancelOrderError:
      summary: Cannot cancel order
      description: The status of the order does not allow its cancelation. Only orders with "status" 'action_required' or
        'created' can be canceled.
      value:
        errors:
        - code: cannot_cancel_order
          message: The status of the order does not allow its cancelation. Only orders with "status" 'action_required' or
            'created' can be canceled.
    CannotCaptureOrderError:
      summary: Cannot capture order
      description: Error. Order cannot be captured. The status of the order does not allow its capture. Only orders with "status"
        'action_required' and "status_detail" 'waiting_capture' can be captured.
      value:
        errors:
        - code: cannot_capture_order
          message: Error. Order cannot be captured. The status of the order does not allow its capture. Only orders with "status"
            'action_required' and "status_detail" 'waiting_capture' can be captured.
    TransactionAlreadyExists:
      summary: Transaction conflict
      description: Returned when a transaction already exists or a business rule prevents adding a new transaction.
      value:
        errors:
        - code: transaction_conflict
          message: A transaction conflict occurred. Check order status and existing transactions.
    CannotRefundOrderError:
      summary: Cannot refund order
      description: Cannot refund order. Please check if the order is already refunded.
      value:
        errors:
        - code: cannot_refund_order
          message: Cannot refund order. Please check if the order is already refunded.
    InvalidTotalAmountError:
      summary: Invalid total amount
      description: The value entered in "total_amount" is not equivalent to the sum of the "transactions.payments.amount"
        field of the total transactions. Please verify if the values are correct.
      value:
        errors:
        - code: invalid_total_amount
          message: The value entered in "total_amount" is not equivalent to the sum of the "transactions.payments.amount"
            field of the total transactions. Please verify if the values are correct.
          details:
          - $.total_amount - expected 100.00, but sum of transactions is 150.00
    InvalidTransactionIDError:
      summary: Invalid transaction ID
      description: The transaction ID provided in the request path is not correct. Please confirm it and provide a valid ID
        to try again.
      value:
        errors:
        - code: invalid_transaction_id
          message: Path param transaction id is invalid.
    InvalidOrderTypeError:
      summary: Invalid order type
      description: The order type provided is invalid or not supported.
      value:
        errors:
        - code: invalid_order_type
          message: 'Invalid order type. Expected one of: online, point, qr.'
    InvalidOrderModeForOperationError:
      summary: Invalid order mode for operation
      description: The order mode does not allow this operation to be performed.
      value:
        errors:
        - code: invalid_order_mode_for_operation
          message: Invalid order mode for operation. This operation is not allowed in the current order mode.
    OrderBuilderWithoutTransactionsError:
      summary: Order builder without transactions
      description: Order created in builder mode must have transactions before processing.
      value:
        errors:
        - code: order_builder_without_transactions
          message: Order builder without transactions. Transactions must be added before processing.
    InvalidPropertiesError:
      summary: Invalid properties
      description: Incorrect information was sent. Check the message returned in the error details to find out what the problem
        was and try again.
      value:
        errors:
        - code: invalid_properties
          message: Incorrect information was sent. Check the message returned in the error details to find out what the problem
            was and try again.
          details:
          - $.payer.email - invalid email format
    MinimumItemsError:
      summary: Minimum items not met

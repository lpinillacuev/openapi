  schemas:
    AutomaticPayments:
      x-visibility: internal
      type: object
      description: Present when the order uses the Automatic Payments feature. `payment_profile_id` is included when a profile
        was used or created; omitted otherwise.
      properties:
        payment_profile_id:
          type: string
        retries:
          type: integer
        schedule_date:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        subscription:
          type: object
          properties:
            id:
              type: string
            sequence:
              type: object
              properties:
                number:
                  type: integer
                total:
                  type: integer
            invoice:
              type: object
              properties:
                id:
                  type: string
                billing_date:
                  type: string
                  format: date
                period:
                  type: object
                  properties:
                    interval:
                      type: integer
                    type:
                      type: string
                      enum:
                      - daily
                      - weekly
                      - monthly
    CaptureOrderOPRequest:
      description: Capture Order request for type=online
      type: object
      properties:
        payments:
          type: array
          minItems: 1
          items:
            type: object
            required:
            - id
            properties:
              id:
                type: string
                format: ulid
              amount:
                type: string
                pattern: ^\d+(\.\d{1,2})?$
                examples:
                - '123.45'
    CaptureOrderOPResponse:
      description: Transaction response for type=online
      type: object
      properties:
        id:
          type: string
          examples:
          - ORD01HRYJPXYM3ZK71F31AQR76KGR
        status:
          type: string
        status_detail:
          type: string
        transactions:
          type: object
          properties:
            payments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    examples:
                    - PAY01HRYJPXYM3ZK71F31AQR76KGR
                  status:
                    type: string
                  status_detail:
                    type: string
                  amount:
                    type: string
                  paid_amount:
                    type: string
                  reference_id:
                    type: string
    ConfirmOrderRequest:
      description: Confirm transaction amounts request (only for instore QR payment type)
      type: object
      required:
      - transactions
      properties:
        transactions:
          type: array
          minItems: 1
          items:
            type: object
            required:
            - id
            - confirmed_amount
            properties:
              id:
                type: string
                format: ulid
                description: Transaction ID to confirm
                examples:
                - PAY01J3GW5GCVQQB7MEN5FMA6ZJF8
              confirmed_amount:
                type: string
                pattern: ^\d+(\.\d{1,2})?$
                description: Final confirmed amount for the transaction
                examples:
                - '113.34'
    GetOrderOPResponse:
      description: Order response for GET type=online
      type: object
      properties:
        id:
          type: string
          examples:
          - ORD01HRYJPXYM3ZK71F31AQR76KGR
        type:
          type: string
          enum:
          - online
        processing_mode:
          type: string
          enum:
          - manual
          - automatic
          - automatic_async
        external_reference:
          type: string
        description:
          type: string
        total_amount:
          type: string
        total_paid_amount:
          type: string
        checkout_available_at:
          x-visibility: internal
          type: string
          examples:
          - P3Y6M4DT12H30M5S
        expiration_time:
          type: string
          examples:
          - P3Y6M4DT12H30M5S
        country_code:
          type: string
          enum:
          - ARG
          - BRA
          - CHL
          - COL
          - MEX
          - PER
          - URY
          - VEN
        user_id:
          x-visibility: internal
          type: string
        status:
          type: string
        status_detail:
          type: string
        capture_mode:
          type: string
          enum:
          - manual
          - automatic
          - automatic_async
          default: automatic_async
        created_date:
          type: string
        last_updated_date:
          type: string
        client_token:
          type:
          - string
          - 'null'
        currency:
          type: string
        integration_data:
          type: object
          properties:
            application_id:
              type: string
        payer:
          x-visibility: internal
          type: object
          properties:
            customer_id:
              type: string
            entity_type:
              description: 'Payer entity type, present for guest payers (e.g. PSE) without a customer_id. Examples: individual,
                association'
              type:
              - string
              - 'null'
            email:
              type: string
              description: 'Email of the payer. Exposed only by `GET /v1/orders/{id}`; `GET /v1/orders` (SEARCH) always strips
                this field.

                Omitted when empty or null upstream. If after omitting `email` no other payer fields remain, the entire `payer`
                node is omitted.

                '
              examples:
              - user@example.com
        config:
          type: object
          properties:
            payment_method:
              type: object
              properties:
                not_allowed_ids:

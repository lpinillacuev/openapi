          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: ulid
              transaction_id:
                type: string
                format: ulid
              amount:
                type: string
              status:
                type: string
    SearchOrdersResponse:
      description: Search orders response
      type: object
      properties:
        data:
          type: array
          items:
            oneOf:
            - $ref: '#/components/schemas/OrderOPResponse'
            - $ref: '#/components/schemas/OrderPointResponse'
            - $ref: '#/components/schemas/OrderQRResponse'
        paging:
          $ref: '#/components/schemas/PagingResponse'
    SendMessageRequest:
      type: object
      required:
      - message
      properties:
        message:
          type: string
          description: Text content of the message to send
          example: I can provide the tracking code for the shipment.
        attachments:
          type: array
          description: File IDs to attach (upload first via attachments endpoint)
          items:
            type: string
    Error:
      type: object
      required:
      - status
      - error
      - message
      properties:
        status:
          type: integer
          description: HTTP status code
          example: 400
        error:
          type: string
          description: Error code identifier
          example: bad_request
        message:
          type: string
          description: Human-readable error message (English)
          example: The access token is invalid
        cause:
          type: array
          items:
            $ref: '#/components/schemas/ErrorCause'
    ErrorCause:
      type: object
      properties:
        code:
          type: integer
          example: 2001
        description:
          type: string
          example: Invalid access token
        data:
          type: string
          nullable: true
    Money:
      type: object
      description: 'Monetary amount. MercadoPago uses decimal amounts (e.g., 100.50 for R$100,50), NOT integer cents. Precision:
        2 decimal places for most currencies; 0 for CLP.'
      properties:
        amount:
          type: number
          format: float
          example: 100.5
        currency_id:
          $ref: '#/components/schemas/CurrencyId'
    CurrencyId:
      type: string
      description: ISO 4217 currency code for the applicable site
      enum:
      - ARS
      - BRL
      - MXN
      - CLP
      - COP
      - PEN
      - UYU
      - BOB
      - PYG
      - USD
      - CRC
      - DOP
      - HNL
      - NIO
      - GTQ
      - VES
      example: BRL
    Identification:
      type: object
      description: Payer identification document. Valid types vary by country.
      properties:
        type:
          type: string
          description: Identification type (e.g., CPF, CNPJ for Brazil; DNI for Argentina; RFC for Mexico)
          example: CPF
        number:
          type: string
          description: Identification number (no formatting — digits only)
          example: '12345678909'
    Phone:
      type: object
      properties:
        area_code:
          type: string
          example: '11'
        number:
          type: string
          example: '987654321'
    Address:
      type: object
      properties:
        zip_code:
          type: string
          example: 01310-100
        street_name:
          type: string
          example: Av. Paulista
        street_number:
          type: string
          example: '1000'
        city:
          type: string
        state:
          type: string
        country:
          type: string
    Payer:
      type: object
      description: Payment payer information
      properties:
        id:
          type: string
          description: MP payer ID (registered users only)
          example: '123456789'
        email:
          type: string
          format: email
          description: Payer email address
          example: test@example.com
        identification:
          $ref: '#/components/schemas/Identification'
        type:
          type: string
          enum:
          - customer
          - registered
          - guest
          description: Payer type
        first_name:
          type: string
        last_name:
          type: string
        phone:
          $ref: '#/components/schemas/Phone'
        address:
          $ref: '#/components/schemas/Address'
    SimulateOrderEventRequest:
      description: Order request for type point
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - processed
          - expired
          - canceled
          - refunded
          - failed
        payment_method_type:
          type: string
          enum:
          - credit_card
          - debit_card
          - qr
          - voucher_card
          - cash
        installments:
          type: integer
    StoreRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Store display name
          example: Main Branch — Paulista
        external_id:
          type: string
          description: Your internal store identifier
        business_hours:
          type: object
          properties:
            monday:
              type: array
              items:
                type: object
                properties:
                  open:
                    type: string
                    example: 09:00
                  close:
                    type: string
                    example: '18:00'
        location:
          type: object
          properties:
            street_number:
              type: string
            street_name:
              type: string
            city_name:
              type: string
            state_name:
              type: string
            zip_code:
              type: string
            latitude:
              type: number
              format: float
            longitude:
              type: number
              format: float
    Store:
      allOf:
      - $ref: '#/components/schemas/StoreRequest'
      - type: object
        properties:
          id:
            type: string
            description: Store unique identifier
          date_created:
            type: string
            format: date-time
          date_last_updated:
            type: string
            format: date-time
    POSRequest:
      type: object
      required:
      - name
      - store_id
      properties:
        name:
          type: string
          description: POS display name
          example: Caixa 1
        store_id:
          type: string
          description: Parent store ID
        external_id:
          type: string
          description: Your internal POS identifier
        external_store_id:
          type: string
        category:
          type: integer
          description: Business category code
        fixed_amount:
          type: boolean
          description: When true the POS amount is fixed and cannot be changed by payer
          default: false
        url:
          type: string
          format: uri
          description: Webhook URL for this specific POS
    POS:
      allOf:
      - $ref: '#/components/schemas/POSRequest'
      - type: object
        properties:
          id:
            type: string
          qr_code:
            type: string
            description: QR code data string for this POS
          qr_code_image:
            type: string
            format: uri
            description: URL of QR code image
          date_created:
            type: string
            format: date-time
          date_last_updated:
            type: string
            format: date-time
    Pagination:
      type: object
      description: Pagination metadata returned in list/search responses
      properties:
        total:
          type: integer
          description: Total number of results
          example: 42
        limit:
          type: integer
          description: Results per page
          example: 30
        offset:
          type: integer
          description: Offset of the current page
          example: 0
    CustomerRequest:
      type: object
      description: Request body to create or update a customer
      properties:
        email:
          type: string
          format: email
          description: Customer email address (unique identifier)
          example: customer@example.com
        first_name:
          type: string
        last_name:
          type: string
        phone:
          $ref: '#/components/schemas/Phone'
        identification:
          $ref: '#/components/schemas/Identification'
        address:
          $ref: '#/components/schemas/Address'
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true
    Customer:
      type: object
      description: A stored MercadoPago customer
      properties:
        id:
          type: string
          description: Customer unique identifier
          example: 123456789-abcd
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          $ref: '#/components/schemas/Phone'
        identification:
          $ref: '#/components/schemas/Identification'
        address:
          $ref: '#/components/schemas/Address'
        date_registered:
          type: string
          format: date-time
        date_created:
          type: string
          format: date-time
        date_last_updated:
          type: string
          format: date-time
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true
        cards:
          type: array
          items:
            $ref: '#/components/schemas/Card'
          description: Saved cards for this customer
        default_card:
          type: string
          description: ID of the customer's default card
    CustomerSearchResult:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Pagination'
        results:
          type: array
          items:
            $ref: '#/components/schemas/Customer'
    SaveCardRequest:
      type: object
      required:
      - token
      description: Request body to save a card to a customer. The card token must be created client-side via MercadoPago.js
        / MP Secure Fields before calling this endpoint. Raw card data (PAN, CVV) must never be sent to your server.
      properties:
        token:
          type: string
          description: Single-use card token from MercadoPago.js
          example: YOUR_ACCESS_TOKEN
    Card:
      type: object
      description: A tokenized card saved to a customer (never contains full PAN or CVV)
      properties:
        id:
          type: string
          description: Card unique identifier
          example: '1234567890'
        customer_id:
          type: string
        first_six_digits:
          type: string
          description: First 6 digits of card (BIN — identifies issuer and type)
          example: '411111'
        last_four_digits:
          type: string
          description: Last 4 digits of card
          example: '4321'
        expiration_month:
          type: integer
          minimum: 1
          maximum: 12
          example: 12
        expiration_year:
          type: integer
          example: 2028
        date_created:
          type: string
          format: date-time
        date_last_updated:
          type: string
          format: date-time
        cardholder:
          type: object
          properties:
            name:
              type: string
              description: Name on card
            identification:
              $ref: '#/components/schemas/Identification'
        payment_method:
          type: object
          properties:
            id:
              type: string
              example: visa
            name:
              type: string
              example: Visa
            payment_type_id:
              type: string
              example: credit_card
            thumbnail:
              type: string
              format: uri
        issuer:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        security_code:
          type: object
          properties:
            mode:
              type: string
              enum:
              - mandatory
              - optional
            length:
              type: integer
              example: 3
    CardTokenRequest:
      type: object
      required:
      - card_number
      - expiration_month
      - expiration_year
      - security_code
      - cardholder
      description: Card tokenization request. This is a CLIENT-SIDE ONLY operation — use MercadoPago.js or MP Secure Fields
        to call this endpoint from the browser. Never send raw card data through your server.
      properties:
        card_number:
          type: string
          description: Full card PAN — client-side only, never server-side
          example: '4111111111111111'
        expiration_month:
          type: integer
          minimum: 1
          maximum: 12
          example: 12
        expiration_year:
          type: integer
          example: 2028
        security_code:
          type: string
          description: CVV / CVC — client-side only
          example: '123'
        cardholder:
          type: object
          required:
          - name
          properties:
            name:
              type: string
              description: Name exactly as printed on card
              example: JOHN DOE
            identification:
              $ref: '#/components/schemas/Identification'
    CardToken:
      type: object
      description: A single-use card token representing a card. Expires in 7 days or after first use. Use this token in payment
        or order creation requests.
      properties:
        id:
          type: string
          description: Token unique identifier — use as the `token` field in payments
          example: YOUR_ACCESS_TOKEN
        first_six_digits:
          type: string
          example: '411111'
        last_four_digits:
          type: string
          example: '4321'
        expiration_month:
          type: integer
        expiration_year:
          type: integer
        date_created:
          type: string
          format: date-time
        date_due:
          type: string
          format: date-time
          description: Token expiry (7 days after creation)
        luhn_validation:
          type: boolean
        status:
          type: string
          enum:
          - active
          - used
          - expired
        card_id:
          type: string
          description: Linked saved card ID (if token was created from a saved card)
        cardholder:
          type: object
          properties:
            name:
              type: string
            identification:
              $ref: '#/components/schemas/Identification'
    PaymentRequest:
      type: object
      required:
      - transaction_amount
      - payer
      description: Request body to create a payment. For card payments, `token` and `payment_method_id` are required. For
        cash/offline methods, only `payment_method_id` is required.
      properties:
        transaction_amount:
          type: number
          format: float
          description: Payment amount as a decimal number. MercadoPago does NOT use integer cents — send 100.50 for R$100,50
            (not 10050). CLP uses 0 decimal places.
          example: 100.5
          minimum: 0.01
        token:
          type: string
          description: Card token created client-side via MercadoPago.js / MP Secure Fields. Required for credit/debit card
            payments. Single-use; expires in 7 days.
          example: YOUR_ACCESS_TOKEN
        description:
          type: string
          description: Description of the purchased product or service
          example: Premium subscription — 1 month
        installments:
          type: integer
          description: Number of installments (1 = no installments)
          example: 1
          minimum: 1
        payment_method_id:
          type: string
          description: 'Payment method identifier. Examples: visa, master, bolbradesco (Boleto), pix, oxxo, rapipago, pse.
            Use GET /v1/payment_methods to list available methods for a given site_id.'
          example: visa
        issuer_id:
          type: string
          description: Card issuer ID (required for some credit cards)
          example: '310'
        payer:
          $ref: '#/components/schemas/PaymentPayer'
        capture:
          type: boolean
          description: 'Two-step payment flow: set false to only authorize (reserve funds), then PUT /v1/payments/{id} with
            capture=true to capture. Debit cards do not support two-step capture.'
          default: true
        binary_mode:
          type: boolean
          description: When true, payments can only be in_process → approved or rejected — no pending state. Useful for in-store
            flows.
          default: false
        external_reference:
          type: string
          description: Your internal order or reference ID. Max 256 chars.
          example: ORDER-2024-001234
        notification_url:
          type: string
          format: uri
          description: URL to receive IPN notifications when payment status changes. DEPRECATED — use Webhooks instead.
          deprecated: true
        statement_descriptor:
          type: string
          description: Text that appears on the payer's card statement. Max 22 chars.
          example: MYSTORE.COM
          maxLength: 22
        callback_url:
          type: string
          format: uri
          description: Redirect URL after bank transfer (redirect-based methods only)
        date_of_expiration:
          type: string
          format: date-time
          description: Expiration date for cash/offline payment methods (boleto, OXXO, etc.). ISO 8601 format. Default varies
            by method.
          example: '2024-12-31T23:59:59.000-03:00'
        metadata:
          type: object
          description: Free key-value object for your own internal data (not used by MP)
          additionalProperties: true
        additional_info:
          $ref: '#/components/schemas/PaymentAdditionalInfo'
        application_fee:
          type: number
          format: float
          description: Marketplace fee charged to the seller (marketplace integrations only)
          example: 1.5
        coupon_code:
          type: string
          description: Discount coupon code
        coupon_amount:
          type: number
          format: float
          description: Coupon discount value
    PaymentPayer:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
          example: customer@example.com
        id:
          type: string
          description: MercadoPago user ID (for registered users)
        identification:
          $ref: '#/components/schemas/Identification'
        type:
          type: string
          enum:
          - customer
          - registered
          - guest
    PaymentAdditionalInfo:
      type: object
      description: Additional context for fraud scoring and installment calculation
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PaymentItem'
        payer:
          type: object
          properties:
            first_name:
              type: string
            last_name:
              type: string
            phone:
              $ref: '#/components/schemas/Phone'
            address:
              $ref: '#/components/schemas/Address'
            registration_date:
              type: string
              format: date-time
        shipments:
          type: object
          properties:
            receiver_address:
              $ref: '#/components/schemas/Address'
    PaymentItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category_id:
          type: string
        quantity:
          type: integer
        unit_price:
          type: number
          format: float
    Payment:
      type: object
      description: A MercadoPago payment object
      properties:
        id:
          type: integer
          description: Payment unique identifier
          example: 1234567890
        date_created:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00.000-03:00'
        date_approved:
          type: string
          format: date-time
          nullable: true
        date_last_updated:
          type: string
          format: date-time
        date_of_expiration:
          type: string
          format: date-time
          nullable: true
        money_release_date:
          type: string
          format: date-time
          nullable: true
        operation_type:
          type: string
          enum:
          - regular_payment
          - money_transfer
          - recurring_payment
          - account_fund
          - payment_addition
          - cellphone_recharge
          - pos_payment
          - money_exchange
        issuer_id:
          type: string
          nullable: true
        payment_method_id:
          type: string
          example: visa
        payment_type_id:
          type: string
          enum:
          - account_money
          - ticket
          - bank_transfer
          - atm
          - credit_card
          - debit_card
          - prepaid_card
          - digital_currency
          - digital_wallet
          - voucher_card
          - crypto
          - pix
        status:
          type: string
          enum:
          - pending
          - approved
          - authorized
          - in_process
          - in_mediation
          - rejected
          - cancelled
          - refunded
          - charged_back
          description: 'Current payment status. Key values: approved — payment completed successfully; pending — awaiting
            payer action (e.g., Boleto payment); in_process — under review; rejected — payment declined.'
          example: approved
        status_detail:
          type: string
          description: Detailed reason for the current status
          example: accredited
        currency_id:
          $ref: '#/components/schemas/CurrencyId'
        description:
          type: string
        payer:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
              format: email
            identification:
              $ref: '#/components/schemas/Identification'
            type:
              type: string
        metadata:
          type: object
          additionalProperties: true
        additional_info:
          type: object
        external_reference:
          type: string
        transaction_amount:
          type: number
          format: float
          description: Original payment amount (decimal, not cents)
        transaction_amount_refunded:
          type: number
          format: float
          description: Total amount refunded so far
        coupon_amount:
          type: number
          format: float
        transaction_details:
          type: object
          properties:
            net_received_amount:
              type: number
              format: float
            total_paid_amount:
              type: number
              format: float
            overpaid_amount:
              type: number
              format: float
            external_resource_url:
              type: string
              format: uri
              description: Boleto/OXXO/cash payment URL or barcode
            installment_amount:
              type: number
              format: float
        captured:
          type: boolean
        binary_mode:
          type: boolean
        statement_descriptor:
          type: string
        installments:
          type: integer
        card:
          type: object
          description: Card data (last 4 digits only — never full PAN)
          properties:
            last_four_digits:
              type: string
              example: '4321'
            first_six_digits:
              type: string
              example: '411111'
            expiration_year:
              type: integer
            expiration_month:
              type: integer
            date_created:
              type: string
              format: date-time
            date_last_updated:
              type: string
              format: date-time
            cardholder:
              type: object
              properties:
                name:
                  type: string
                identification:
                  $ref: '#/components/schemas/Identification'
        notification_url:
          type: string
          format: uri
          deprecated: true
        processing_mode:
          type: string
          enum:
          - aggregator
          - gateway
    Refund:
      type: object
      description: A payment refund (partial or full)
      properties:
        id:
          type: integer
          example: 987654321
        payment_id:
          type: integer
        date_created:
          type: string
          format: date-time
        amount:
          type: number
          format: float
          description: Refunded amount (decimal)
        source:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            type:
              type: string
        refund_mode:
          type: string
          enum:
          - standard
          - instant
        status:
          type: string
          enum:
          - approved
          - in_process
          - rejected
    RefundRequest:
      type: object
      description: Request body for creating a refund. Omit amount for a full refund.
      properties:
        amount:
          type: number
          format: float
          description: Amount to refund. Omit for a full refund.
          example: 50.0
    PaymentSearchResult:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        paging:
          $ref: '#/components/schemas/Pagination'
    ReportConfig:
      type: object
      description: Configuration for scheduled report generation
      properties:
        columns:
          type: array
          description: Columns to include in the report
          items:
            type: object
            properties:
              key:
                type: string
                example: DATE
              alias:
                type: string
                example: transaction_date
        file_name_prefix:
          type: string
          description: Prefix for generated report filenames
          example: releases_report
        frequency:
          type: object
          description: Schedule frequency for automatic generation
          properties:
            hour:
              type: integer
              minimum: 0
              maximum: 23
            type:
              type: string
              enum:
              - daily
              - weekly
              - monthly
        sftp_info:
          type: object
          description: SFTP destination for automatic delivery (optional)
          properties:
            server:
              type: string
            port:
              type: integer
            username:
              type: string
            remote_dir:
              type: string
        separator:
          type: string
          description: CSV column separator character
          enum:
          - ','
          - ;
          - ''
          default: ','
        display_timezone:
          type: string
          description: Timezone for date columns (IANA format)
          example: America/Sao_Paulo
        notification_email_list:
          type: array
          description: Email addresses to notify when report is ready
          items:
            type: string
            format: email
    ReportRequest:
      type: object
      required:
      - begin_date
      - end_date
      description: Request body to generate a one-time report
      properties:
        begin_date:
          type: string
          format: date-time
          description: Start of the reporting period (ISO 8601)
          example: '2024-01-01T00:00:00Z'
        end_date:
          type: string
          format: date-time
          description: End of the reporting period (ISO 8601)
          example: '2024-01-31T23:59:59Z'
    ReportTask:
      type: object
      description: Status of a report generation task
      properties:
        id:
          type: string
          description: Task unique identifier
          example: task_abc123
        status:
          type: string
          enum:
          - pending
          - in_progress
          - done
          - failed
          description: pending — queued; in_progress — generating; done — ready to download; failed — generation error
        begin_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        download_url:
          type: string
          format: uri
          description: Download URL (present when status=done)
          nullable: true
    ReportEntry:
      type: object
      description: A generated report file entry
      properties:
        id:
          type: string
        status:
          type: string
          enum:
          - available
          - expired
        date_created:
          type: string
          format: date-time
        date_last_updated:
          type: string
          format: date-time
        begin_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        file_name:
          type: string
          example: releases_report_2024-01-01_2024-01-31.csv
    ReportListResult:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Pagination'
        results:
          type: array
          items:
            $ref: '#/components/schemas/ReportEntry'
    SubscriptionPlanRequest:
      type: object
      required:
      - reason
      - auto_recurring
      description: Request body to create a subscription plan (preapproval_plan). A plan defines the recurring billing terms.
        Individual subscriptions (preapproval) are then created referencing this plan.
      properties:
        reason:
          type: string
          description: Plan description shown to the payer
          example: Monthly Premium Subscription
        auto_recurring:
          $ref: '#/components/schemas/AutoRecurring'
        payment_methods_allowed:
          type: object
          properties:
            payment_types:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
            payment_methods:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
        back_url:
          type: string
          format: uri
          description: Redirect URL after subscription setup
    AutoRecurring:
      type: object
      required:
      - frequency
      - frequency_type
      - transaction_amount
      - currency_id
      properties:
        frequency:
          type: integer
          description: Billing interval (e.g., 1 for monthly, 7 for weekly)
          example: 1
        frequency_type:
          type: string
          enum:
          - months
          - days
          description: Unit for the billing interval
          example: months
        transaction_amount:
          type: number
          format: float
          description: Amount to charge each cycle (decimal, not cents)
          example: 29.9
        currency_id:
          $ref: '#/components/schemas/CurrencyId'
        free_trial:
          type: object
          description: Optional free trial period before billing starts
          properties:
            frequency:
              type: integer
              example: 14
            frequency_type:
              type: string
              enum:
              - months
              - days
              example: days
        repetitions:
          type: integer
          description: Total number of billing cycles (null = indefinite)
          nullable: true
    SubscriptionPlan:
      type: object
      description: A subscription plan (preapproval_plan)
      properties:
        id:
          type: string
          example: 2c9380847e9c5058017ea64ea8260b60
        reason:
          type: string
        status:
          type: string
          enum:
          - active
          - inactive
        auto_recurring:
          $ref: '#/components/schemas/AutoRecurring'
        date_created:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time
        init_point:
          type: string
          format: uri
          description: URL to subscribe users to this plan
    SubscriptionRequest:
      type: object
      required:
      - reason
      - payer_email
      - auto_recurring
      description: Request body to create a subscription (preapproval). Either reference a preapproval_plan or define auto_recurring
        inline.
      properties:
        preapproval_plan_id:
          type: string
          description: Reference a previously created plan (recommended)
        reason:
          type: string
          description: Subscription description shown to payer
          example: Monthly Premium — Acme Inc.
        payer_email:
          type: string
          format: email
          description: Payer's email address
        card_token_id:
          type: string
          description: Card token for credit card subscriptions
        auto_recurring:
          $ref: '#/components/schemas/AutoRecurring'
        back_url:
          type: string
          format: uri
        external_reference:
          type: string
          example: CUSTOMER-ID-12345
        status:
          type: string
          enum:
          - pending
          - authorized
          - paused
          - cancelled
          description: Initial status (default is pending until payer authorizes)
    Subscription:
      type: object
      description: A MercadoPago subscription (preapproval)
      properties:
        id:
          type: string
          example: 2c9380847e9c5058017ea64ea8260b60
        payer_id:
          type: integer
        payer_email:
          type: string
          format: email
        preapproval_plan_id:
          type: string
        reason:
          type: string
        external_reference:
          type: string
        status:
          type: string
          enum:
          - pending
          - authorized
          - paused
          - cancelled
        date_created:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time
        auto_recurring:
          $ref: '#/components/schemas/AutoRecurring'
        summarized:
          type: object
          description: Subscription billing summary
          properties:
            quotas:
              type: integer
            charged_quantity:
              type: integer
            pending_charge_quantity:
              type: integer
            charged_amount:
              type: number
              format: float
            pending_charge_amount:
              type: number
              format: float
        next_payment_date:
          type: string
          format: date-time
        payment_method_id:
          type: string
        card_id:
          type: integer
        init_point:
          type: string
          format: uri
          description: Authorization URL — send payer here to confirm subscription
    AuthorizedPayment:
      type: object
      description: An invoice generated by a subscription billing cycle
      properties:
        id:
          type: integer
        preapproval_id:
          type: string
        status:
          type: string
          enum:
          - scheduled
          - processed
          - recycling
          - cancelled
        status_detail:
          type: string
        date_created:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time
        transaction_amount:
          type: number
          format: float
        currency_id:
          $ref: '#/components/schemas/CurrencyId'
        payment:
          type: object
          properties:
            id:
              type: integer
              description: Linked payment ID in /v1/payments
            status:
              type: string
            status_detail:
              type: string
    SubscriptionSearchResult:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Pagination'
        results:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
    TransactionOPRequest:
      description: Transaction request for type=online
      type: object
      properties:
        payments:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: object
            minProperties: 1
            required:
            - amount
            - payment_method
            properties:
              amount:
                type: string
                minLength: 1
                maxLength: 18
                pattern: ^\d+(\.\d{1,2})?$
                examples:
                - '123.45'
              expiration_time:
                type: string
                format: duration
                pattern: ^P(?:\d+Y)?(?:\d+M)?(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+S)?)?$
                description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
                examples:
                - P3Y6M4DT12H30M5S
              payment_method:
                type: object
                minProperties: 1
                required:
                - id
                properties:
                  id:
                    type: string
                    enum:
                    - abitab
                    - account_money
                    - amex
                    - argencard
                    - banesco
                    - bolbradesco
                    - boleto
                    - cabal
                    - cencosud
                    - clabe
                    - cmr
                    - codensa
                    - consumer_credits
                    - creditel
                    - debcabal
                    - debelo
                    - debin_transfer
                    - debmaster
                    - debvisa
                    - diners
                    - edenred
                    - efecty
                    - elo
                    - hipercard
                    - interop_transfer
                    - kushki
                    - lider
                    - maestro
                    - master
                    - mercantil
                    - naranja
                    - oca
                    - oxxo
                    - pagoefectivo_atm
                    - pagofacil
                    - paycash
                    - pix
                    - pse
                    - rapipago
                    - redcompra
                    - redpagos
                    - serfin
                    - sivale_despensa
                    - sivale_restaurant
                    - sucredito
                    - visa
                  type:
                    type: string
                  token:
                    type: string
                    minLength: 32
                    maxLength: 32
                  installments:
                    type: integer
                    minimum: 1
                  statement_descriptor:
                    type: string
                    minLength: 1
                    maxLength: 50
                  financial_institution:
                    type: string
                    description: Financial institution code. Required for PSE bank_transfer payments in MCO.
                    examples:
                    - '1007'

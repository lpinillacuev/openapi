      description: Transaction response for type=online
      type: object
      properties:
        id:
          type: string
          format: ulid
        status:
          type: string
        status_detail:
          type: string
        transactions:
          type: object
          properties:
            refunds:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: ulid
                  transaction_id:
                    type: string
                    format: ulid
                  reference_id:
                    x-visibility: internal
                    type: string
                  amount:
                    type: string
                  status:
                    type: string
    RefundsResponse:
      description: Refunds response

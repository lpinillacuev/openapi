          type: number
          format: float
        reason:
          type: string
    RefundOrderOPRequest:
      description: Transaction request for type=online. 'transactions' and 'splits' are mutually exclusive — only one can
        be sent per request.
      type: object
      properties:
        transactions:
          type: array
          description: Transactions to refund. Mutually exclusive with 'splits'.
          minItems: 1
          items:
            type: object
            required:
            - id
            properties:
              id:
                type: string
                format: ulid
              amount:
                type: string
                pattern: ^\d+(\.\d{1,2})?$
                examples:
                - '123.45'
        splits:
          x-visibility: wip
          type: array
          description: Split participants to refund. Mutually exclusive with 'transactions'.
          minItems: 1
          items:
            type: object
            required:
            - user_id
            properties:
              user_id:
                type: integer
                description: User ID of the participant to refund
                examples:
                - 1
              amount:
                type: string
                pattern: ^\d+(\.\d{1,2})?$
                description: Amount to refund (if not specified, refunds the full split amount)
                examples:
                - '50.00'

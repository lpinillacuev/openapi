      required:
        - id
        - type
        - token
      properties:
        id:
          type: string
          enum:
            - debcabal
            - debelo
            - debmaster
            - debvisa
        type:
          type: string
          enum:
            - debit_card
        token:
          type: string
          minLength: 32
          maxLength: 32
        statement_descriptor:
          type: string
          minLength: 1
          maxLength: 50
    OrderOPPaymentMethodTicketRequest:
      type: object
      minProperties: 1
      required:
        - id
        - type
      properties:
        id:
          type: string
          enum:
            - pagofacil
            - rapipago
            - oxxo
            - paycash
            - bolbradesco
            - boleto
        type:
          type: string
          enum:
            - ticket
    OrderPointRequest:
      description: Order request for type=point
      required:
        - type
        - external_reference
        - transactions
        - config
        - description
      properties:
        type:
          type: string
          enum:
            - point
        external_reference:
          type: string
          description: >-
            Unique identifier for this order in the merchant's system. Accepts letters (a-z, A-Z), numbers (0-9),
            hyphens (-), and underscores (_).
          minLength: 1
          maxLength: 150
          pattern: ^([a-zA-Z0-9\-_]+)$
          example: ext_ref_1234
        taxes:
          type: array
          minItems: 1
          description: This field is only available for site MLC
          items:
            type: object
            minProperties: 1
            required:
              - payer_condition
            properties:
              payer_condition:
                type: string
                enum:
                  - payment_exempt_iva
                  - payment_taxable_iva
              value:
                type: string
              type:
                type: string
        transactions:
          type: object
          minProperties: 1
          properties:
            payments:
              type: array
              minItems: 1
              maxItems: 1
              items:
                type: object
                minProperties: 1
                required:
                  - amount
                properties:
                  amount:
                    type: string
                    minLength: 1
                    maxLength: 18
                    pattern: ^\d+(\.\d{1,2})?$
                    example: '123.45'
        config:
          type: object
          minProperties: 1
          properties:
            point:
              type: object
              minProperties: 1
              properties:
                terminal_id:
                  type: string
                  minLength: 5
                  maxLength: 50
                  pattern: ^(GERTEC_MP35P|INGENICO_MOVE2500|PAX_A910|NEWLAND_N950)__[a-zA-Z0-9]+$
                print_on_terminal:
                  type: string
                  enum:
                    - seller_ticket
                    - no_ticket
                  default: seller_ticket
                ticket_number:
                  type: string
                  minLength: 1
                  maxLength: 20
                screen_time:
                  type: string
                  format: duration
                  minLength: 2
                  maxLength: 30
                  pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
                  example: P1D
                  description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
                congrats_time:
                  type: string
                  format: duration
                  minLength: 2
                  maxLength: 30
                  pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
                  example: P1D
                  description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
            payment_method:
              type: object
              minProperties: 1
              properties:
                default_type:
                  type: string
                  enum:
                    - credit_card
                    - debit_card
                    - prepaid_card
                default_installments:
                  type: integer
                  minimum: 1
                installments_cost:
                  type: string
        description:
          type: string
          minLength: 1
          maxLength: 150
        expiration_time:
          type: string
          format: duration
          minLength: 2
          maxLength: 30
          pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
          example: P1D
          description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
    OrderQRRequest:
      description: Order request for type=qr
      required:
        - type
        - external_reference
        - transactions
        - config
      properties:
        type:
          type: string
          enum:
            - online
            - point
            - qr
        expiration_time:
          type: string
          pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
        external_reference:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^([a-zA-Z0-9-_]+)$
          example: ext_ref_1234
        marketplace_fee:
          type: string
          maxLength: 32
          pattern: ^[0-9]+([.][0-9]{2,2})+?$
          description: This field is only used for the QR flow.
        integration_data:
          type: object
          minProperties: 1
          properties:
            corporation_id:
              type: string
              minLength: 1
              maxLength: 36
            integrator_id:
              type: string
              minLength: 1
              maxLength: 36
              pattern: ^dev_.*$
            platform_id:
              type: string
              minLength: 1
              maxLength: 36
            sponsor:
              type: object
              properties:
                id:
                  type: string
                  minLength: 1
                  maxLength: 15
        transactions:
          type: object
          minProperties: 1
          properties:
            payments:
              type: array
              minItems: 1
              maxItems: 1
              items:
                type: object
                minProperties: 1
                required:
                  - amount
                properties:
                  amount:
                    type: string
                    minLength: 4
                    maxLength: 32
                    pattern: ^[0-9]+([.][0-9]{2,2})+?$
                    example: '123.45'
            cash_outs:
              type: array
              minItems: 1
              maxItems: 1
              items:
                type: object
                minProperties: 1
                required:
                  - amount
                properties:
                  amount:
                    type: string
                    minLength: 4
                    maxLength: 32
                    pattern: ^[0-9]+([.][0-9]{2,2})+?$
                    example: '123.45'
                  additional_info:
                    type: object
                    properties:
                      external_cashier_id:
                        type: integer
                      fixed_amount:
                        type: boolean
                      agency_type:
                        type: string
                        enum:
                          - AGTEC
                          - AGTOT
                          - AGPSS
                      bank_service_code:
                        type: string
        config:
          type: object
          minProperties: 1
          required:
            - qr
          properties:
            qr:
              type: object
              minProperties: 1
              required:
                - external_pos_id
              properties:
                external_pos_id:
                  type: string
                  minLength: 1
                  maxLength: 40
                mode:
                  type: string
                  enum:
                    - static
                    - dynamic
                    - hybrid
            payment_method:
              type: object
              properties:
                default_type:
                  type: string
                  example: credit_card
                installments_cost:
                  type: string
                  example: seller
                installments:
                  type: object
                  properties:
                    interest_free:
                      type: object
                      properties:
                        type:
                          type: string
                          example: range
                        values:
                          type: array
                          items:
                            type: integer
                          example:
                            - 1
                            - 6
                    available:
                      type: object
                      properties:
                        type:
                          type: string
                          example: all
        total_amount:
          type: string
          minLength: 1
          maxLength: 32
          pattern: ^[0-9]+([.][0-9]{2,2})+?$
          example: '1234.56'
        processing_mode:
          type: string
          enum:
            - manual
            - automatic
            - automatic_async
          default: automatic
        description:
          type: string
          minLength: 1
          maxLength: 150
        items:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: object
            minProperties: 1
            required:
              - title
              - unit_price
              - quantity
              - unit_measure
            properties:
              title:
                type: string
                minLength: 1
                maxLength: 150
              unit_price:
                type: string
                minLength: 4
                maxLength: 32
                pattern: ^[0-9]+([.][0-9]{2,2})+?$
              quantity:
                type: integer
                minimum: 1
              unit_measure:
                type: string
                minLength: 1
                maxLength: 10
              external_code:
                type: string
              external_categories:
                type: array
                uniqueItems: true
                minItems: 1
                items:
                  type: object
                  minProperties: 1
                  required:
                    - id
                  properties:
                    id:
                      type: string
                      minLength: 1
        discounts:
          type: object
          minProperties: 1
          required:
            - payment_methods
          properties:
            payment_methods:
              type: array
              minItems: 1
              items:
                type: object
                minProperties: 1
                required:
                  - type
                  - new_total_amount
                properties:
                  new_total_amount:
                    type: string
                    maxLength: 32
                    pattern: ^[0-9]+([.][0-9]{2,2})+?$
                  type:
                    type: string
                    enum:
                      - credit_card
                      - debit_card
                      - account_money
                      - prepaid_card
        taxes:
          type: array
          minItems: 1
          description: This field is only available for site MLC
          items:
            type: object
            minProperties: 1
            required:
              - payer_condition
            properties:
              payer_condition:
                type: string
                enum:
                  - payment_exempt_iva
                  - payment_taxable_iva
    CaptureOrderOPRequest:
      description: Capture Order request for type=online
      type: object
      properties:
        payments:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - id
            properties:

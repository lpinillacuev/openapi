    OrderOPPaymentRequest:
      type: array
      minItems: 1
      maxItems: 1
      items:
        type: object
        minProperties: 1
        required:
          - amount
          - payment_method
        properties:
          amount:
            type: string
            minLength: 1
            maxLength: 18
            pattern: ^\d+(\.\d{1,2})?$
            example: '123.45'
          expiration_time:
            type: string
            format: duration
            pattern: ^P(?:\d+Y)?(?:\d+M)?(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+S)?)?$
            example: P1D
            description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
          date_of_expiration:
            type: string
            format: date-time
            example: '2024-12-31T23:59:59.000Z'
            description: Expiration date and time for the payment transaction (ISO 8601 format).
          payment_method:
            oneOf:
              - $ref: '#/components/schemas/OrderOPPaymentMethodBankTransferRequest'
              - $ref: '#/components/schemas/OrderOPPaymentMethodCreditCardRequest'
              - $ref: '#/components/schemas/OrderOPPaymentMethodDebitCardRequest'
              - $ref: '#/components/schemas/OrderOPPaymentMethodTicketRequest'
    OrderOPPaymentAutomaticPaymentsRequest:
      x-visibility: internal
      description: |
        Payment item for orders that integrate with Automatic Payments.
        Currently only **card** payment methods (credit / debit) are accepted.

        Two flows are supported:
        - **Profile reuse**: include `automatic_payments.payment_profile_id` to
          charge against an existing Profile. `processing_mode` may be
          `automatic` or `automatic_async`.
        - **Profile creation on first request**: omit the `automatic_payments`
          node entirely and set `stored_credential.first_payment: true` and
          `stored_credential.store_payment_method: true`. The Profile is
          created during the first successful transaction. In this flow the
          order's `processing_mode` **must be `automatic`** —
          `automatic_async` is not supported.
      type: array
      minItems: 1
      maxItems: 2
      items:
        type: object
        minProperties: 1
        required:
          - amount
        properties:
          amount:
            type: string
            minLength: 1
            maxLength: 18
            pattern: ^\d+(\.\d{1,2})?$
            example: '123.45'
          payment_method:
            oneOf:
              - $ref: '#/components/schemas/OrderOPPaymentMethodCreditCardRequest'
              - $ref: '#/components/schemas/OrderOPPaymentMethodDebitCardRequest'
          automatic_payments:
            type: object
            properties:
              payment_profile_id:
                type: string
                pattern: ^[a-z0-9]{32}$
              retries:
                type: integer
                minimum: 1
                maximum: 5
              schedule_date:
                type: string
                format: date-time
              due_date:
                type: string
                format: date-time
              subscription:
                type: object
                required:
                  - id
                  - sequence
                  - invoice
                properties:
                  id:
                    type: string
                  sequence:
                    type: object
                    required:
                      - number
                      - total
                    properties:
                      number:
                        type: integer
                        minimum: 1
                      total:
                        type: integer
                        minimum: 1
                  invoice:
                    type: object
                    required:
                      - id
                      - billing_date
                      - period
                    properties:
                      id:
                        type: string
                      billing_date:
                        type: string
                        format: date
                      period:
                        type: object
                        required:
                          - interval
                          - type
                        properties:
                          interval:
                            type: integer
                            minimum: 1
                          type:
                            type: string
                            enum:
                              - daily
                              - weekly
                              - monthly
          stored_credential:
            x-visibility: internal
            type: object
            required:
              - payment_initiator
            properties:
              payment_initiator:
                type: string
                enum:
                  - customer
                  - merchant
              reason:
                type: string
                enum:
                  - card_on_file
                  - recurring
              previous_transaction_reference:
                type: string
                description: Reference to a previous transaction for stored credential usage
              store_payment_method:
                type: boolean
              first_payment:
                type: boolean

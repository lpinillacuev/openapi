        MercadoPago.js with the PUBLIC_KEY. Never call this endpoint server-side — doing so puts raw PAN and CVV on your
        server and brings your integration into full PCI DSS scope.

        **PCI scope:** Handling this endpoint brings your integration into PCI DSS scope.

        **Auth note:** Use PUBLIC_KEY for this endpoint (not ACCESS_TOKEN). Public key is safe in frontend code. Using
        ACCESS_TOKEN here from the browser exposes your server credentials.

    BuyerChargebackDetail:
      type: object
      description: Comprehensive details of a chargeback case from the buyer's perspective
      properties:
        id:
          type: string
          description: Unique identifier of the chargeback case
          example: '12345678'
        item:
          $ref: '#/components/schemas/Item'
        payment:
          $ref: '#/components/schemas/Payment'
        detailLink:
          type: string
          description: URL link to detailed chargeback information
          example: https://www.mercadolibre.com/jms/mla/lgz/msl/chargeback/12345678
        caseStatus:
          type: string
          description: Current status of the chargeback case
          enum:
            - open
            - closed
            - in_review
            - resolved
          example: open
        repaymentLink:
          type: string
          description: URL link for repayment processing
          example: https://www.mercadopago.com/mla/debits/12345678/pay
        typificationPayer:
          type: string
          description: Typification category assigned to the payer
          example: unrecognized_purchase
        repaymentStatus:
          type: string
          description: Status of the repayment process
          enum:
            - pending
            - in_process
            - completed
            - failed
          example: pending
        debt:
          $ref: '#/components/schemas/BuyerChargebackDebtStatus'
        labels:
          type: array
          description: Labels or tags associated with the chargeback
          items:
            type: string
          example:
            - high_priority
            - documentation_pending
        flow:
          type: string
          description: The workflow or process flow the chargeback is following
          example: standard_flow
        activities:
          type: object
          description: Map of activity categories to activity lists
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/Activity'
          example:
            messages:
              - dateCreated: '2026-06-15T10:30:00Z'
                message: Documentation requested
                sender: system
            updates:
              - dateCreated: '2026-06-16T14:20:00Z'
                message: Case status updated
                sender: operator
    BuyerChargebackDebtStatus:
      type: object
      description: Debt information associated with a chargeback case
      properties:
        amount:
          type: number
          format: decimal
          description: Total debt amount
          example: 1250.5
        recoveryAmount:
          type: number
          format: decimal
          description: Amount recovered so far
          example: 500
        targetAmount:
          type: number
          format: decimal
          description: Target amount for recovery
          example: 1250.5
        status:
          type: string
          description: Current status of the debt
          enum:
            - pending
            - in_recovery
            - recovered
            - written_off
          example: in_recovery
        refundedDate:
          type: string
          format: date-time
          description: Date when the debt was refunded

paths:
  /v1/payments:
    post:
      operationId: createPayment
      summary: Create a payment
      description: >-
        Creates a payment. For card payments, generate a card token client-side via MercadoPago.js before calling this
        endpoint. For cash/offline methods (Boleto, OXXO, Pix), the response includes a payment URL in
        `transaction_details.external_resource_url`.

        **Idempotency**: Include `X-Idempotency-Key` to safely retry on network errors without risk of double charges.

        **Recommendation**: For new integrations, prefer the Orders API (`POST /v1/orders`).

        **Idempotent:** Supports `X-Idempotency-Key` header to safely retry without duplicate charges.

        **Webhook events triggered:** payment, merchant_order
      tags:
        - Payments
      security:
        - bearerAuth: []
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: >-
            Unique key per payment attempt. If you retry with the same key and the original payment was processed, MP
            returns the original result without creating a duplicate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
            examples:
              card_brazil:
                summary: Credit card — Brazil (Visa)
                value:
                  transaction_amount: 100.5
                  token: YOUR_ACCESS_TOKEN
                  description: Premium subscription — 1 month
                  installments: 1
                  payment_method_id: visa
                  payer:
                    email: test@example.com
                    identification:
                      type: CPF
                      number: '12345678909'
              pix_brazil:
                summary: Pix — Brazil
                value:
                  transaction_amount: 100.5
                  payment_method_id: pix
                  payer:
                    email: test@example.com
                    identification:
                      type: CPF
                      number: '12345678909'
              boleto_brazil:
                summary: Boleto Bancário — Brazil
                value:
                  transaction_amount: 100.5
                  payment_method_id: bolbradesco
                  payer:
                    email: test@example.com
                    first_name: João
                    last_name: Silva
                    identification:
                      type: CPF
                      number: '12345678909'
              card_argentina:
                summary: Credit card — Argentina (Visa)
                value:
                  transaction_amount: 5000
                  token: YOUR_ACCESS_TOKEN
                  description: 'Order #1234'
                  installments: 3
                  payment_method_id: visa
                  payer:
                    email: test@example.com
                    identification:
                      type: DNI
                      number: '12345678'
              oxxo_mexico:
                summary: OXXO — Mexico
                value:
                  transaction_amount: 500
                  payment_method_id: oxxo
                  date_of_expiration: '2024-12-31T23:59:59.000-06:00'
                  payer:
                    email: test@example.com
              pagoefectivo_peru:
                summary: PagoEfectivo — Peru
                x-mp-sites:
                  - MPE
                value:
                  transaction_amount: 200
                  payment_method_id: pagoefectivo_atm
                  date_of_expiration: '2024-12-31T23:59:59.000-05:00'
                  payer:
                    email: test@example.com
                    identification:
                      type: DNI
                      number: '12345678'
      responses:
        '200':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /v1/payments/{id}:
    get:
      operationId: getPayment
      summary: Get payment by ID
      tags:
        - Payments
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Payment ID
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updatePayment
      summary: Update or capture a payment
      description: >-
        Update payment fields or capture an authorized payment. To capture an authorized two-step payment: send
        `{"capture": true}`. To cancel an authorized payment: send `{"status": "cancelled"}`.
      tags:
        - Payments
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentUpdateRequest'
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/payments/search:
    get:
      operationId: searchPayments
      summary: Search payments
      tags:
        - Payments
      security:
        - bearerAuth: []
      parameters:
        - name: sort
          in: query
          required: true
          schema:
            type: string
        - name: criteria
          in: query
          required: true
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: external_reference
          in: query
          schema:
            type: string
        - name: range
          in: query
          schema:
            type: string
            enum:
              - date_created
              - date_last_updated
              - money_release_date
        - name: begin_date
          in: query
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          schema:
            type: string
        - name: store_id
          in: query
          schema:
            type: string
        - name: pos_id
          in: query
          schema:
            type: string
        - name: collector.id
          in: query
          schema:
            type: string
        - name: payer.id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/payments/{id}/refunds:
    post:
      operationId: createRefund
      summary: Create a refund
      description: >-
        Creates a full or partial refund for an approved payment. Omit the `amount` field for a full refund. Partial
        refunds are supported; multiple partials are allowed up to the original transaction amount.

        **Idempotent:** Supports `X-Idempotency-Key` header to safely retry without duplicate charges.
      tags:
        - Cancellations & Refunds
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Payment ID to refund
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
            examples:
              full_refund:
                summary: Full refund (omit amount)
                value: {}
              partial_refund:
                summary: Partial refund of R$50
                value:
                  amount: 50
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  payment_id:
                    type: integer
                  amount:
                    type: number
                    format: float
                  metadata:
                    type: object
                    additionalProperties: true
                  source:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      type:
                        type: string
                  date_created:
                    type: string
                    format: date-time
                  unique_sequence_number:
                    type: string
                  refund_mode:
                    type: string
                    enum:
                      - standard
                      - instant
                  adjustment_amount:
                    type: number
                    format: float
                    nullable: true
                  status:
                    type: string
                    enum:
                      - approved
                      - in_process
                      - rejected
                  reason:
                    type: string
                    nullable: true
                  label:
                    type: string
                    nullable: true
                  partition_details:
                    type: array
                    items:
                      type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      operationId: listRefunds
      summary: List refunds for a payment
      tags:
        - Cancellations & Refunds
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Refund list
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  payment_id:
                    type: integer
                  amount:
                    type: number
                    format: float
                  metadata:
                    type: object
                    additionalProperties: true
                  source:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      type:
                        type: string
                  date_created:
                    type: string
                    format: date-time
                  unique_sequence_number:
                    type: string
                  refund_mode:
                    type: string
                    enum:
                      - standard
                      - instant
                  adjustment_amount:
                    type: number
                    format: float
                    nullable: true
                  status:
                    type: string
                    enum:
                      - approved
                      - in_process
                      - rejected
                  reason:
                    type: string
                    nullable: true
                  label:
                    type: string
                    nullable: true
                  partition_details:
                    type: array
                    items:
                      type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/payments/{id}/refunds/{refund_id}:
    get:
      operationId: getRefund
      summary: Get a specific refund
      tags:
        - Cancellations & Refunds
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: refund_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Refund found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  payment_id:
                    type: integer
                  amount:
                    type: number
                    format: float
                  metadata:
                    type: object
                    additionalProperties: true
                  source:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      type:
                        type: string
                  date_created:
                    type: string
                    format: date-time
                  unique_sequence_number:
                    type: string
                  refund_mode:
                    type: string
                    enum:
                      - standard
                      - instant
                  adjustment_amount:
                    type: number
                    format: float
                    nullable: true
                  status:
                    type: string
                    enum:
                      - approved
                      - in_process
                      - rejected
                  reason:
                    type: string
                    nullable: true
                  label:
                    type: string
                    nullable: true
                  partition_details:
                    type: array
                    items:
                      type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/orders:
    post:
      tags:
        - Public Order
      summary: Creates a new order
      description: >
        Create orders in **Automatic** or **Manual** mode for payment and cash out transactions.


        * In **Automatic** mode, the request is created and its transactions are executed, all information must be sent
        in a single request.


        * In **Manual** mode, the request can be built in parts, creation is made on the first request and allows for
        further interactions without executing transactions. To confirm the execution of transactions, you must call the
        processing feature.


        To select the mode in which the request will be created, use the **processing_mode** property.

        * **automatic**: Creates in Automatic mode.

        * **manual**: Creates in Manual mode.


        For transactions involving the means of payment credit card, allows to perform authorization and subsequent
        capture through the **capture_mode** property.

        * **automatic_async**: Authorizes and captures values at the same time.

        * **manual**: Authorizes and the capture of values must be performed manually.
      parameters:
        - $ref: '#/components/parameters/XIdempotencyKey'
        - $ref: '#/components/parameters/XProductID'
      requestBody:
        $ref: '#/components/requestBodies/CreateOrder'
      responses:
        '201':
          $ref: '#/components/responses/CreateOrder'
        '400':
          $ref: '#/components/responses/CreateOrderBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/CreateOrderFailed'
        '404':
          $ref: '#/components/responses/CreateOrderNotFound'
        '409':
          $ref: '#/components/responses/CreateOrderConflict'
        '410':
          $ref: '#/components/responses/CreateOrderGone'
        '422':
          $ref: '#/components/responses/CreateOrderUnprocessableEntity'
        '423':
          $ref: '#/components/responses/CreateOrderResourceLocked'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Public Order
      summary: Search orders
      description: |
        Search for orders using various filters and pagination. This endpoint allows you to find orders based on:

        * **Date range** (required): Filter orders by creation date using `begin_date` and `end_date`
        * **External reference**: Filter by external reference ID
        * **Order type**: Filter by order type (online, point, qr)
        * **Status**: Filter by order status (created, in_review, processing, etc.)
        * **Status detail**: Filter by detailed status information
        * **Payment method**: Filter by payment method ID
        * **Payment type**: Filter by payment type ID

        Results are paginated and can be sorted by creation date or last updated date.
      parameters:
        - $ref: '#/components/parameters/BeginDate'
        - $ref: '#/components/parameters/EndDate'
        - $ref: '#/components/parameters/ExternalReference'
        - $ref: '#/components/parameters/OrderType'
        - $ref: '#/components/parameters/OrderStatus'
        - $ref: '#/components/parameters/StatusDetail'
        - $ref: '#/components/parameters/PaymentMethodID'
        - $ref: '#/components/parameters/PaymentMethodType'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          $ref: '#/components/responses/SearchOrders'
        '400':
          $ref: '#/components/responses/SearchOrdersBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Internal server error
  /v1/orders/{id}:
    get:
      operationId: getOrder
      summary: Get order by ID
      description: Returns all order information for the given order ID.
      tags:
        - Orders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Order ID
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/orders/{order_id}/cancel:
    post:
      tags:
        - Public Order
      summary: Cancel an existing order
      parameters:
        - $ref: '#/components/parameters/OrderID'
        - $ref: '#/components/parameters/XIdempotencyKey'
        - $ref: '#/components/parameters/XProductID'
      responses:
        '200':
          $ref: '#/components/responses/CancelOrder'
        '400':
          $ref: '#/components/responses/CancelOrderBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/CancelOrderNotFound'
        '409':
          $ref: '#/components/responses/CancelOrderConflict'
        '500':
          description: Generic error
  /v1/orders/{order_id}/process:
    post:
      tags:
        - Public Order
      summary: Process order
      description: Execute the transactions of an Order created in **Manual** mode.
      parameters:
        - $ref: '#/components/parameters/OrderID'
        - $ref: '#/components/parameters/XIdempotencyKey'
        - $ref: '#/components/parameters/XProductID'
      responses:
        '200':
          $ref: '#/components/responses/Process'

openapi: 3.1.0
info:
  title: MercadoPago API — Peru (MPE)
  description: |
    MercadoPago API specification scoped to Peru (site_id: MPE).

    ## Peru-specific notes

    - **Currency**: PEN — send amounts as decimals (e.g., `50.00`)

    - **Identification**: `DNI` (Documento Nacional de Identidad)
  termsOfService: https://www.mercadopago.com/developers/es/docs/resources/legal/terms-and-conditions
  contact:
    name: MercadoPago Developer Experience
    url: https://www.mercadopago.com.pe/developers
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
  x-mp-country-note: >
    Peru (MPE): Currency PEN. PagoEfectivo is the primary cash/bank transfer network covering BCP, BBVA, Interbank,
    Scotiabank, and cash agents. DNI is the primary identification type.
servers:
  - url: https://api.mercadopago.com
    description: Production
security:

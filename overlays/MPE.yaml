overlay: "1.0.0"
info:
  title: MercadoPago MPE (Peru) Overlay
  version: "1.0.0"
  description: >
    Country-specific additions for Peru (site_id: MPE).
    Currency: PEN. Key payment methods: Visa, Mastercard, BCP, BBVA,
    PagoEfectivo (cash network). Identification type: DNI, CE, RUC.

actions:
  - target: "$.info"
    description: Add Peru-specific notes
    update:
      x-mp-country-note: >
        Peru (MPE): Currency PEN. PagoEfectivo is the primary cash/bank transfer
        network covering BCP, BBVA, Interbank, Scotiabank, and cash agents.
        DNI is the primary identification type.

  - target: "$.paths['/v1/payments'].post.requestBody.content['application/json'].examples"
    description: Add Peru payment examples
    update:
      pagoefectivo_peru:
        summary: PagoEfectivo — Peru
        x-mp-sites: [MPE]
        value:
          transaction_amount: 200.00
          payment_method_id: pagoefectivo_atm
          date_of_expiration: "2024-12-31T23:59:59.000-05:00"
          payer:
            email: "test@example.com"
            identification:
              type: DNI
              number: "12345678"

  - target: "$.components"
    description: Peru-specific schemas
    update:
      x-mp-mpe-payment-methods:
        credit_cards: [visa, master, amex, diners]
        debit_cards: [debvisa, debmaster]
        atm: [pagoefectivo_atm, bcp, bbva, interbank, scotiabank]
        digital_wallets: [account_money]
      x-mp-mpe-identification-types:
        - id: DNI
          name: Documento Nacional de Identidad
          type: number
          min_length: 8
          max_length: 8
        - id: CE
          name: Carné de Extranjería
          type: number
          min_length: 9
          max_length: 12
        - id: RUC
          name: Registro Único de Contribuyentes
          type: number
          min_length: 11
          max_length: 11

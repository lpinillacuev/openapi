          $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.CounterCurrency'
        coupon_code:
          type: string
        coupon_labels:
          type: array
          items:
            type: string
        date_of_expiration:
          type: string
        differential_pricing:
          $ref: >-
            #/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.DifferentialPricing
        expiration_date_from:
          type: string
        expiration_date_to:
          type: string
        expires:
          type: boolean
        external_reference:
          type: string
        fee_details:
          type: array
          items:
            $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.FeeDetail'
        financing_group:
          type: string
        internal_metadata:
          type: object
          additionalProperties: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Item'
        live_mode:
          type: boolean
        marketplace:
          type: string
        marketplace_fee:
          type: number
        merchant_order_id:
          type: number
        metadata:
          type: object
          additionalProperties: true
        notification_url:
          type: string
        operation_type:
          type: string
        order_id:
          type: number
        payer:
          $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Payer'
        payment_methods:
          $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.PaymentMethod'
        processing_modes:
          type: array
          items:
            type: string
        purpose:
          type: string
        purpose_descriptor:
          type: object
        redirect_urls:
          $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.URLConfig'
        shipments:
          $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Shipment'
        sponsor_id:
          type: number
        statement_descriptor:
          type: number
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Tax'
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Track'
        version:
          type: integer
    Identification:
      type: object
      description: Payer identification document. Valid types vary by country.
      properties:
        type:
          type: string
          description: Identification type (e.g., CPF, CNPJ for Brazil; DNI for Argentina; RFC for Mexico)
          example: CPF
        number:
          type: string
          description: Identification number (no formatting — digits only)
          example: '12345678909'
    Item:
      type: object
      description: Item information involved in the chargeback
      properties:
        id:
          type: string
          description: Item identifier
          example: MLA123456789
        name:
          type: string
          description: Item name or title
          example: Smartphone Samsung Galaxy S23
        image:
          type: string
          description: URL to item image
          example: https://http2.mlstatic.com/D_123456-MLA.jpg
        categoryId:
          type: string
          description: Category identifier
          example: MLA1055
        shippingAddress:
          type: string
          description: Shipping address for the item
          example: Av. Libertador 1234, CABA, Argentina
    MediationResolution:
      type: object
      description: Expected resolution options at mediation stage
      properties:
        type:
          type: string
          enum:
            - refund
            - return
            - partial_refund
        amount:
          type: number
          format: float
        reason:
          type: string
    Money:
      type: object
      description: >-
        Monetary amount. MercadoPago uses decimal amounts (e.g., 100.50 for R$100,50), NOT integer cents. Precision: 2
        decimal places for most currencies; 0 for CLP.
      properties:
        amount:
          type: number
          format: float
          example: 100.5
        currency_id:
          $ref: '#/components/schemas/CurrencyId'
    Pagination:
      type: object
      required:
        - total
        - limit
        - offset
        - has_more
      properties:
        has_more:
          type: boolean
          description: Whether there are more results available
          example: true
        total:
          type: integer
          description: Total number of payments matching the criteria
          example: 250
        offset:
          type: integer
          description: Current offset
          example: 0
        limit:
          type: integer
          description: Current limit
          example: 20
    Paging:
      type: object
      description: Pagination information for search results
      properties:
        offset:
          type: integer
          description: Number of results skipped
          example: 0
        limit:
          type: integer
          description: Maximum number of results returned
          example: 20
        total:
          type: integer
          description: Total number of results available
          example: 45
    Payer:
      type: object
      description: Payment payer information
      properties:
        id:
          type: string
          description: MP payer ID (registered users only)
          example: '123456789'
        email:
          type: string
          format: email
          description: Payer email address
          example: test@example.com
        identification:
          $ref: '#/components/schemas/Identification'
        type:
          type: string
          enum:
            - customer
            - registered
            - guest
          description: Payer type
        first_name:
          type: string
        last_name:
          type: string
        phone:
          $ref: '#/components/schemas/Phone'
        address:
          $ref: '#/components/schemas/Address'
    PayerChargebacks:
      type: object
      description: Collection of chargeback cases for a specific payer/user
      properties:
        open:
          type: array
          description: List of open chargeback cases
          items:
            $ref: '#/components/schemas/BuyerChargebackDetail'
        closed:
          type: array
          description: List of closed chargeback cases
          items:
            $ref: '#/components/schemas/BuyerChargebackDetail'
    PayerUser:
      type: object
      description: Payer/buyer user information
      properties:
        id:
          type: integer
          format: int64
          description: User identifier
          example: 987654321
        email:
          type: string
          format: email
          description: User email address
          example: buyer@example.com
        nickname:
          type: string
          description: User nickname
          example: BUYER456
    Phone:
      type: object
      properties:
        area_code:
          type: string
          example: '11'
        number:
          type: string
          example: '987654321'
    POS:
      allOf:
        - $ref: '#/components/schemas/POSRequest'
        - type: object
          properties:
            id:
              type: string
            qr_code:
              type: string
              description: QR code data string for this POS
            qr_code_image:
              type: string
              format: uri
              description: URL of QR code image
            date_created:
              type: string
              format: date-time
            date_last_updated:
              type: string
              format: date-time
    POSRequest:
      type: object
      required:
        - name
        - store_id
      properties:
        name:
          type: string
          description: POS display name
          example: Caixa 1
        store_id:
          type: string
          description: Parent store ID
        external_id:
          type: string
          description: Your internal POS identifier
        external_store_id:
          type: string
        category:
          type: integer
          description: Business category code
        fixed_amount:
          type: boolean
          description: When true the POS amount is fixed and cannot be changed by payer
          default: false
        url:
          type: string
          format: uri
          description: Webhook URL for this specific POS
    SellerChargebackDetail:
      type: object
      description: Comprehensive details of a chargeback case from the seller's perspective
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the chargeback case
          example: 12345678
        siteId:
          type: string
          description: Site identifier (e.g., MLA, MLB, MLM)
          example: MLA
        paymentId:
          type: integer
          format: int64
          description: Associated payment identifier
          example: 98765432101
        transactionId:
          type: integer
          format: int64
          description: Transaction identifier
          example: 11122233344
        paymentDate:
          type: string
          format: date-time
          description: Date when the payment was made
          example: '2026-05-10T15:30:00Z'
        amount:
          type: number
          format: decimal
          description: Chargeback amount
          example: 1250.5
        coveragePercentage:
          type: number
          format: decimal
          description: Percentage of coverage applied
          example: 80
        orderId:
          type: string
          description: Associated order identifier
          example: '2000123456789'
        reason:
          type: string
          description: Reason for the chargeback
          example: Unrecognized transaction
        dateCreated:
          type: string
          format: date-time
          description: Date when the chargeback was created
          example: '2026-06-01T10:00:00Z'
        dateClosed:
          type:
            - string
            - 'null'
          format: date-time
          description: Date when the chargeback was closed
        paymentDateCreated:
          type: string
          format: date-time
          description: Date when the payment was created
          example: '2026-05-10T15:30:00Z'
        lastModified:
          type: string
          format: date-time
          description: Date of last modification
          example: '2026-06-15T14:22:00Z'
        marketplace:
          type: string
          description: Marketplace identifier
          example: MELI
        itemId:
          type: string
          description: Item identifier involved in the chargeback
          example: MLA123456789
        itemThumbnail:
          type: string
          description: URL to item thumbnail image
          example: https://http2.mlstatic.com/D_123456-MLA.jpg
        currencyId:
          type: string
          description: Currency code
          example: ARS
        cartType:
          type: string
          description: Type of cart or purchase
          example: cart
        marketplaceOwnerId:
          type: integer
          format: int64
          description: Marketplace owner identifier
          example: 135790246
        cartPurchaseId:
          type: integer
          format: int64
          description: Cart purchase identifier
          example: 11111222223
        cartPackId:
          type: integer
          format: int64
          description: Cart pack identifier
          example: 99988877766
        status:
          type: string
          description: Current status of the chargeback
          enum:
            - open
            - documentation_pending
            - under_review
            - closed
            - resolved
          example: documentation_pending
        statusDetail:
          type: string
          description: Detailed status information
          example: Waiting for seller documentation
        documentationDeadline:
          type: string
          format: date-time
          description: Deadline for submitting documentation
          example: '2026-06-20T23:59:59Z'
        collector:
          $ref: '#/components/schemas/SellerUser'
        payer:
          $ref: '#/components/schemas/PayerUser'
        labels:
          type: array
          description: Labels or tags associated with the chargeback
          items:
            type: string
          example:
            - requires_attention
            - high_value
        flow:
          type: string
          description: The workflow or process flow
          example: seller_documentation_flow
    SellerUser:
      type: object
      description: Seller/collector user information
      properties:
        id:
          type: integer
          format: int64
          description: User identifier
          example: 123456789
        email:
          type: string
          format: email
          description: User email address
          example: seller@example.com
        nickname:
          type: string
          description: User nickname
          example: SELLER123
        collaborators:
          type: array
          description: List of collaborators associated with the seller
          items:
            $ref: '#/components/schemas/CollaboratorDetail'
    SendMessageRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Text content of the message to send
          example: I can provide the tracking code for the shipment.
        attachments:
          type: array
          description: File IDs to attach (upload first via attachments endpoint)
          items:
            type: string
    StandardResponse:
      type: object
      description: Standard API response format for errors and messages
      properties:
        status:
          type: string
          enum:
            - success
            - error
          description: Response status
          example: error
        data:
          type: string
          description: Response message or error description
          example: Internal Server Error
    Store:
      allOf:
        - $ref: '#/components/schemas/StoreRequest'
        - type: object
          properties:
            id:
              type: string
              description: Store unique identifier
            date_created:
              type: string
              format: date-time
            date_last_updated:
              type: string
              format: date-time
    StoredPaymentMethodResponse:
      type: object
      required:
        - payment_method_id
        - customer_id
        - type
        - is_default
        - created_at
      properties:
        is_default:
          description: Whether this is the default payment method
          type: boolean
          example: true
        updated_at:
          format: date-time
          description: Last update timestamp
          type: string
          example: '2024-01-15T07:30:15Z'
        payment_method_id:
          format: uuid
          description: Unique payment method identifier
          type: string
          example: pm_456e7890-a12b-34c5-d678-901234567890
        created_at:
          format: date-time
          description: Payment method creation timestamp
          type: string
          example: '2024-01-15T07:30:00Z'
        customer_id:
          format: uuid
          description: Customer identifier
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        last_four:
          type: string
          description: Last four digits of card (for card payments only)
          example: '1111'
        type:
          description: Type of payment method
          type: string
          enum:
            - credit_card
            - debit_card
            - bank_transfer
            - digital_wallet
            - cryptocurrency
          example: credit_card
    StoreRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Store display name
          example: Main Branch — Paulista
        external_id:
          type: string
          description: Your internal store identifier
        business_hours:
          type: object
          properties:
            monday:
              type: array
              items:
                type: object
                properties:
                  open:
                    type: string
                    example: '09:00'
                  close:
                    type: string
                    example: '18:00'
        location:
          type: object
          properties:
            street_number:
              type: string
            street_name:
              type: string
            city_name:
              type: string
            state_name:
              type: string
            zip_code:
              type: string
            latitude:
              type: number
              format: float
            longitude:
              type: number
              format: float
    ValidationResponse:
      type: object
      required:
        - is_valid
      properties:
        is_valid:
          type: boolean
          description: Whether the payment method is valid
          example: true
        suggestions:
          type: array
          description: Suggestions for fixing validation issues
          items:
            type: string
            example: Please check the expiry date
        errors:
          type: array
          description: List of validation errors
          items:
            type: object
            properties:
              message:
                type: string
                description: Validation error message
                example: Card has expired
              field:
                type: string
                description: Field that failed validation
                example: expiry_month

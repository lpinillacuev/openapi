                      - sivale_restaurant
                      - sucredito
                      - visa
                  type:
                    type: string
                  token:
                    type: string
                    minLength: 32
                    maxLength: 32
                  installments:
                    type: integer
                    minimum: 1
                  statement_descriptor:
                    type: string
                    minLength: 1
                    maxLength: 50

components:
  schemas:
    Address:
      type: object
      required:
        - street
        - city
        - state
        - postal_code
        - country
      properties:
        street:
          type: string
          description: Street address
          example: 123 Main St
        city:
          type: string
          description: City name
          example: New York
        country:
          pattern: ^[A-Z]{2}$
          description: ISO 3166-1 alpha-2 country code
          type: string
          example: US
        state:
          type: string
          description: State or province
          example: NY
        postal_code:
          type: string
          description: Postal or ZIP code
          example: '10001'
    AutoRecurring:
      type: object
      required:
        - frequency
        - frequency_type
        - transaction_amount
        - currency_id
      properties:
        frequency:
          type: integer
          description: Billing interval (e.g., 1 for monthly, 7 for weekly)
          example: 1
        frequency_type:
          type: string
          enum:
            - months
            - days
          description: Unit for the billing interval
          example: months
        transaction_amount:
          type: number
          format: float
          description: Amount to charge each cycle (decimal, not cents)
          example: 29.9
        currency_id:
          $ref: '#/components/schemas/CurrencyId'
        free_trial:
          type: object
          description: Optional free trial period before billing starts
          properties:
            frequency:
              type: integer
              example: 14
            frequency_type:
              type: string
              enum:
                - months
                - days
              example: days
        repetitions:
          type: integer
          description: Total number of billing cycles (null = indefinite)
          nullable: true
    BankAccount:
      type: object
      required:
        - account_number
        - routing_number
      properties:
        account_number:
          type: string
          description: Bank account number
        routing_number:
          type: string
          description: Bank routing number
        account_type:
          type: string
          enum:
            - checking
            - savings
          description: Type of bank account
    CurrencyId:
      type: string
      description: ISO 4217 currency code for the applicable site
      enum:
        - ARS
        - BRL
        - MXN
        - CLP
        - COP
        - PEN
        - UYU
        - BOB
        - PYG
        - USD
        - CRC
        - DOP
        - HNL
        - NIO
        - GTQ
        - VES
      x-mp-sites:
        - MLA
        - MLB
        - MLM
        - MLC
        - MCO
        - MPE
        - MLU
      example: BRL
    DigitalWallet:
      type: object
      required:
        - provider
        - wallet_id
      properties:
        provider:
          type: string
          enum:
            - paypal
            - apple_pay
            - google_pay
            - venmo
          description: Digital wallet provider
        wallet_id:
          type: string
          description: Wallet identifier or token
    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
          example: invalid_payment_method
        message:
          type: string
          description: Human-readable error message
          example: The provided payment method is invalid or expired
        details:
          type: object
          additionalProperties: true
          description: Additional error details
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: '2024-01-15T10:30:00Z'
    ErrorCause:
      type: object
      properties:
        code:
          type: integer
          example: 2001
        description:
          type: string
          example: Invalid access token
        data:
          type: string
          nullable: true
    github_com_melisource_fury_mpcs-preferences-api_internal_domain_model.Address:
      type: object
      properties:
        city:
          type: string
        federal_unit:
          type: string
        neighborhood:
          type: string
        street_name:
          type: string
        street_number:
          type: string
        zip_code:

    TransactionOPRequest:
      description: Transaction request for type=online
      type: object
      properties:
        payments:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: object
            minProperties: 1
            required:
              - amount
              - payment_method
            properties:
              amount:
                type: string
                minLength: 1
                maxLength: 18
                pattern: ^\d+(\.\d{1,2})?$
                example: '123.45'
              expiration_time:
                type: string
                format: duration
                pattern: ^P(?:\d+Y)?(?:\d+M)?(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+S)?)?$
                example: P3Y6M4DT12H30M5S
                description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
              payment_method:
                type: object
                minProperties: 1
                required:
                  - id
                properties:
                  id:
                    type: string
                    enum:
                      - abitab
                      - account_money

    OrderPayment:
      type: object
      required:
        - amount
        - payment_method
      properties:
        amount:
          type: string
          description: Transaction amount as a decimal string.
          example: '100.00'
        payment_method:
          $ref: '#/components/schemas/OrderPaymentMethod'
        expiration_time:
          type: string
          description: >
            Transaction expiration in ISO 8601 duration format (e.g. "P1D" = 1 day, "PT20M" = 20 minutes). Applies to
            ticket and bank transfer payment methods.
          example: P1D
        date_of_expiration:
          type: string
          format: date-time
          description: Absolute expiration date-time. Takes precedence over expiration_time if both provided.
    OrderPaymentMethod:
      type: object
      required:
        - id
        - type
      description: |
        Payment method for the transaction. Use GET /v1/payment_methods to list available methods for your site.
      properties:
        id:
          type: string
          description: >
            Payment method identifier. Examples by type: Cards: visa, master, elo, hipercard, amex. Ticket/cash:
            bolbradesco (Boleto), oxxo, rapipago, pagofacil. Bank transfer: pix, clabe (SPEI), pse.
          example: visa
        type:
          type: string
          enum:
            - credit_card
            - debit_card
            - bank_transfer
            - ticket
            - digital_wallet
            - account_money
          example: credit_card
        token:
          type: string
          description: Card token. Required for credit_card and debit_card types.
          example: 1c87b6b301010101ddcd92f9bbbb3be2
        installments:
          type: integer
          description: Number of installments. Use 1 for no installments.
          minimum: 1
          example: 1
        statement_descriptor:
          type: string
          description: Text shown on payer's card statement. Maximum 50 characters.
          maxLength: 50
        financial_institution:
          type: string
          description: Bank code. Required for PSE (Colombia) bank transfer payments.
          example: '1051'
    OrderPointRequest:
      description: Order request for type=point
      required:
        - type
        - external_reference
        - transactions
        - config
        - description
      properties:
        type:
          type: string
          enum:
            - point
        external_reference:
          type: string
          description: >-
            Unique identifier for this order in the merchant's system. Accepts letters (a-z, A-Z), numbers (0-9),
            hyphens (-), and underscores (_).
          minLength: 1
          maxLength: 150
          pattern: ^([a-zA-Z0-9\-_]+)$
          example: ext_ref_1234
        taxes:
          type: array
          minItems: 1
          description: This field is only available for site MLC
          items:
            type: object
            minProperties: 1
            required:
              - payer_condition
            properties:
              payer_condition:
                type: string
                enum:
                  - payment_exempt_iva
                  - payment_taxable_iva
              value:
                type: string
              type:
                type: string
        transactions:
          type: object
          minProperties: 1
          properties:
            payments:
              type: array
              minItems: 1
              maxItems: 1
              items:
                type: object
                minProperties: 1
                required:
                  - amount
                properties:
                  amount:
                    type: string
                    minLength: 1
                    maxLength: 18
                    pattern: ^\d+(\.\d{1,2})?$
                    example: '123.45'
        config:
          type: object
          minProperties: 1
          properties:
            point:
              type: object
              minProperties: 1
              properties:
                terminal_id:
                  type: string
                  minLength: 5
                  maxLength: 50
                  pattern: ^(GERTEC_MP35P|INGENICO_MOVE2500|PAX_A910|NEWLAND_N950)__[a-zA-Z0-9]+$
                print_on_terminal:
                  type: string
                  enum:
                    - seller_ticket
                    - no_ticket
                  default: seller_ticket
                ticket_number:
                  type: string
                  minLength: 1
                  maxLength: 20
                screen_time:
                  type: string
                  format: duration
                  minLength: 2
                  maxLength: 30
                  pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
                  example: P1D
                  description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
                congrats_time:
                  type: string
                  format: duration
                  minLength: 2
                  maxLength: 30
                  pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
                  example: P1D
                  description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
            payment_method:
              type: object
              minProperties: 1
              properties:
                default_type:
                  type: string
                  enum:
                    - credit_card
                    - debit_card
                    - prepaid_card
                default_installments:
                  type: integer
                  minimum: 1
                installments_cost:
                  type: string
        description:
          type: string
          minLength: 1
          maxLength: 150
        expiration_time:
          type: string
          format: duration
          minLength: 2
          maxLength: 30
          pattern: ^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$
          example: P1D
          description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).

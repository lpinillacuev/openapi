components:
  schemas:
    Order:
      type: object
      description: A MercadoPago Order.
      properties:
        id:
          type: string
          description: Order unique identifier, automatically generated by MercadoPago.
          example: 01JG28GRB9NYTG6VVS3R5N58YT
        type:
          type: string
          example: online
        processing_mode:
          type: string
          enum:
            - automatic
            - manual
        capture_mode:
          type: string
          enum:
            - automatic
            - manual
            - automatic_async
        status:
          type: string
          enum:
            - created
            - processed
            - action_required
            - processing
            - canceled
          description: >
            created — order created, waiting for processing. processed — all transactions successfully processed.
            action_required — integrator action needed (e.g. capture an authorized payment). processing — being
            processed; no action needed from integrator. canceled — order canceled, will not be processed further.
          example: processed
        status_detail:
          type: string
          enum:
            - created
            - accredited
            - in_process
            - in_review
            - waiting_payment
            - waiting_capture
            - waiting_transfer
          description: >
            accredited — payment credited; waiting_payment — waiting for payer to complete offline payment;
            waiting_capture — authorized payment awaiting capture; waiting_transfer — waiting for bank transfer.
          example: accredited
        external_reference:
          type: string
        total_amount:
          type: string
          description: Total order amount as decimal string.
          example: '100.00'
        total_paid_amount:
          type: string
          description: Total amount effectively paid so far.
          example: '100.00'
        description:
          type: string
        country_code:
          type: string
          description: site_id of the order (e.g. MLB, MLA).
          example: MLB
        user_id:
          type: integer
          description: Collector (seller) user ID.
        created_date:
          type: string
          format: date-time
        last_updated_date:
          type: string
          format: date-time
        client_token:
          type: string
          description: |
            Token for client-side rendering of the payment UI (e.g. Bricks). Only returned when applicable.
        payer:
          $ref: '#/components/schemas/OrderPayer'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        shipment:
          $ref: '#/components/schemas/OrderShipment'
        transactions:
          type: object
          properties:
            payments:
              type: array
              items:
                $ref: '#/components/schemas/OrderTransactionPayment'
        config:
          $ref: '#/components/schemas/OrderConfig'
        integration_data:
          type: object
    OrderConfig:
      type: object
      description: Optional settings for the order.
      properties:
        online:
          type: object
          description: Settings for online card transactions.
          properties:
            transaction_security:
              type: object
              description: >
                3DS (3D Secure) configuration. After creating the order, the response indicates if a challenge is
                required via transactions.payments[].payment_method.transaction_security.
              properties:
                validation:
                  type: string
                  enum:
                    - supported
                    - required
                    - never
                  description: >
                    supported — run 3DS when supported by issuer; required — always run 3DS, reject if not supported;
                    never — skip 3DS entirely.
                liability_shift:
                  type: string
                  enum:
                    - required
                    - not_required
                  description: >
                    Required when validation is not "never". required — only approve if liability shifts to issuer;
                    not_required — approve regardless of liability shift outcome.
            callback_url:
              type: string
              format: uri
              description: Redirect URL after PSE bank authentication completes.
              example: https://merchant.com/pse/return
    OrderItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: float
        category_id:
          type: string
    OrderOPPayerAutomaticPaymentsRequest:
      type: object
      description: Payer node when `automatic_payments` node is present
      minProperties: 1
      required:
        - customer_id
      properties:
        customer_id:
          type: string
          minLength: 1
          maxLength: 100
        first_name:
          type: string
          minLength: 1
          maxLength: 255
        last_name:
          type: string
          minLength: 1
          maxLength: 255
        identification:
          type: object
          minProperties: 1
          required:
            - type
            - number
          properties:
            type:
              type: string
              minLength: 1
              maxLength: 10
            number:
              type: string
              minLength: 1
              maxLength: 20
        phone:
          type: object
          minProperties: 1
          properties:
            area_code:
              type: string
              minLength: 1
              maxLength: 10
            number:
              type: string
              minLength: 1
              maxLength: 20
        address:
          type: object
          minProperties: 1
          properties:
            street_name:
              type: string
              minLength: 1
              maxLength: 100
            street_number:
              type: string
              minLength: 1
              maxLength: 10
            zip_code:
              type: string
              minLength: 1
              maxLength: 20
            neighborhood:
              type: string
              minLength: 1
              maxLength: 40
            state:
              type: string
              minLength: 2
              maxLength: 50
            city:
              type: string
              minLength: 1
              maxLength: 40
            complement:
              type: string
              minLength: 1
              maxLength: 20
    OrderOPPayerRequest:
      type: object
      minProperties: 1
      required:
        - email
      properties:
        email:
          type: string
          minLength: 1
          maxLength: 30
          format: email
        first_name:
          type: string
          minLength: 1
          maxLength: 255
        last_name:
          type: string
          minLength: 1
          maxLength: 255
        entity_type:
          type: string
          description: Payer entity type. Required for PSE bank_transfer payments in MCO.
          enum:
            - individual
            - association
        identification:
          type: object
          minProperties: 1
          required:
            - type
            - number
          properties:
            type:
              type: string
              minLength: 1
              maxLength: 10
            number:
              type: string
              minLength: 1
              maxLength: 20
        phone:
          type: object
          minProperties: 1
          properties:
            area_code:
              type: string
              minLength: 1
              maxLength: 10
            number:
              type: string
              minLength: 1
              maxLength: 20
        address:
          type: object
          minProperties: 1
          properties:
            street_name:
              type: string
              minLength: 1
              maxLength: 100
            street_number:
              type: string
              minLength: 1
              maxLength: 10
            zip_code:
              type: string
              minLength: 1
              maxLength: 20
            neighborhood:
              type: string
              minLength: 1
              maxLength: 40
            state:
              type: string
              minLength: 2
              maxLength: 50
            city:
              type: string
              minLength: 1
              maxLength: 40
            complement:
              type: string
              minLength: 1
              maxLength: 20
        customer_id:
          type: string
          description: >-
            Customer ID in Mercado Pago's system. Mutually exclusive with the combination of `email` and `payer.id`.
            Used in automatic payments flows alongside the `automatic_payments` payment method.
          x-visibility: partner
          minLength: 1
          maxLength: 100
    OrderOPPaymentAutomaticPaymentsRequest:
      x-visibility: internal
      description: |
        Payment item for orders that integrate with Automatic Payments.
        Currently only **card** payment methods (credit / debit) are accepted.

        Two flows are supported:
        - **Profile reuse**: include `automatic_payments.payment_profile_id` to
          charge against an existing Profile. `processing_mode` may be
          `automatic` or `automatic_async`.
        - **Profile creation on first request**: omit the `automatic_payments`
          node entirely and set `stored_credential.first_payment: true` and
          `stored_credential.store_payment_method: true`. The Profile is
          created during the first successful transaction. In this flow the
          order's `processing_mode` **must be `automatic`** —
          `automatic_async` is not supported.
      type: array
      minItems: 1
      maxItems: 2
      items:
        type: object
        minProperties: 1
        required:
          - amount
        properties:
          amount:
            type: string
            minLength: 1
            maxLength: 18
            pattern: ^\d+(\.\d{1,2})?$
            example: '123.45'
          payment_method:
            oneOf:
              - $ref: '#/components/schemas/OrderOPPaymentMethodCreditCardRequest'
              - $ref: '#/components/schemas/OrderOPPaymentMethodDebitCardRequest'
          automatic_payments:
            type: object
            properties:
              payment_profile_id:
                type: string
                pattern: ^[a-z0-9]{32}$
              retries:
                type: integer
                minimum: 1
                maximum: 5
              schedule_date:
                type: string
                format: date-time
              due_date:
                type: string
                format: date-time
              subscription:
                type: object
                required:
                  - id
                  - sequence
                  - invoice
                properties:
                  id:
                    type: string
                  sequence:
                    type: object
                    required:
                      - number
                      - total
                    properties:
                      number:
                        type: integer
                        minimum: 1
                      total:
                        type: integer
                        minimum: 1
                  invoice:
                    type: object
                    required:
                      - id
                      - billing_date
                      - period
                    properties:
                      id:
                        type: string
                      billing_date:
                        type: string
                        format: date
                      period:
                        type: object
                        required:
                          - interval
                          - type
                        properties:
                          interval:
                            type: integer
                            minimum: 1
                          type:
                            type: string
                            enum:
                              - daily
                              - weekly
                              - monthly
          stored_credential:
            x-visibility: internal
            type: object
            required:
              - payment_initiator
            properties:
              payment_initiator:
                type: string
                enum:
                  - customer
                  - merchant
              reason:
                type: string
                enum:
                  - card_on_file
                  - recurring
              previous_transaction_reference:
                type: string
                description: Reference to a previous transaction for stored credential usage
              store_payment_method:
                type: boolean
              first_payment:
                type: boolean
    OrderOPPaymentMethodBankTransferRequest:
      type: object
      minProperties: 1
      required:
        - id
        - type
      properties:
        id:
          type: string
          enum:
            - clabe
            - pix
        type:
          type: string
          enum:
            - bank_transfer
    OrderOPPaymentMethodCreditCardRequest:
      type: object
      minProperties: 1
      required:
        - id
        - type
        - token
        - installments
      properties:
        id:
          type: string
          enum:
            - amex
            - argencard
            - banesco
            - cabal
            - cencosud
            - cmr
            - codensa
            - creditel
            - diners
            - edenred
            - elo
            - hipercard
            - kushki
            - lider
            - maestro
            - master
            - mercantil
            - naranja
            - oca
            - redcompra
            - sivale_despensa
            - sivale_restaurant
            - sucredito
            - visa
        type:
          type: string
          enum:
            - credit_card
            - prepaid_card
        token:
          type: string
          minLength: 32
          maxLength: 32
        installments:
          type: integer
          minimum: 1
        statement_descriptor:
          type: string
          minLength: 1
          maxLength: 50
    OrderOPPaymentMethodDebitCardRequest:
      type: object
      minProperties: 1
      required:
        - id
        - type
        - token
      properties:
        id:
          type: string
          enum:
            - debcabal
            - debelo
            - debmaster
            - debvisa
        type:
          type: string
          enum:
            - debit_card
        token:
          type: string
          minLength: 32
          maxLength: 32
        statement_descriptor:
          type: string
          minLength: 1
          maxLength: 50
    OrderOPPaymentMethodTicketRequest:
      type: object
      minProperties: 1
      required:
        - id
        - type
      properties:
        id:
          type: string
          enum:
            - pagofacil
            - rapipago
            - oxxo
            - paycash
            - bolbradesco
            - boleto
        type:
          type: string
          enum:
            - ticket
    OrderOPPaymentRequest:
      type: array
      minItems: 1
      maxItems: 1
      items:
        type: object
        minProperties: 1
        required:
          - amount
          - payment_method
        properties:
          amount:
            type: string
            minLength: 1
            maxLength: 18
            pattern: ^\d+(\.\d{1,2})?$
            example: '123.45'
          expiration_time:
            type: string
            format: duration
            pattern: ^P(?:\d+Y)?(?:\d+M)?(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+S)?)?$
            example: P1D
            description: Duration in ISO 8601 format (e.g. 'P1D' for 1 day, 'PT1H' for 1 hour).
          date_of_expiration:
            type: string
            format: date-time
            example: '2024-12-31T23:59:59.000Z'
            description: Expiration date and time for the payment transaction (ISO 8601 format).
          payment_method:
            oneOf:
              - $ref: '#/components/schemas/OrderOPPaymentMethodBankTransferRequest'
              - $ref: '#/components/schemas/OrderOPPaymentMethodCreditCardRequest'
              - $ref: '#/components/schemas/OrderOPPaymentMethodDebitCardRequest'
              - $ref: '#/components/schemas/OrderOPPaymentMethodTicketRequest'
    OrderOPRequest:
      description: Order request for type=online
      type: object
      required:
        - type
        - external_reference
        - transactions
        - payer
        - total_amount
      properties:
        type:
          type: string
          enum:
            - online
            - point
            - qr
        external_reference:
          type: string
          description: >-
            Unique identifier for this order in the merchant's system. Accepts letters (a-z, A-Z), numbers (0-9),
            hyphens (-), and underscores (_).
          minLength: 1
          maxLength: 150
          pattern: ^([a-zA-Z0-9\-_]+)$
          example: ext_ref_1234
        currency:
          x-visibility: internal
          type: string
          enum:
            - BRL
            - ARS
            - MXN
            - CLP
            - COP
            - PEN
            - UYU
            - USD
        transactions:
          type: object
          minProperties: 1
          properties:
            payments:
              oneOf:
                - $ref: '#/components/schemas/OrderOPPaymentRequest'
                - $ref: '#/components/schemas/OrderOPPaymentAutomaticPaymentsRequest'
        payer:
          oneOf:
            - $ref: '#/components/schemas/OrderOPPayerRequest'
            - $ref: '#/components/schemas/OrderOPPayerAutomaticPaymentsRequest'
        total_amount:
          type: string
          description: 'Total order amount. Required field. Format: decimal number with up to 2 decimal places (e.g. "1234.56").'
          minLength: 1
          maxLength: 18
          pattern: ^\d+(\.\d{1,2})?$
          example: '1234.56'
        capture_mode:
          type: string
          enum:
            - manual
            - automatic
            - automatic_async
          default: automatic
        processing_mode:
          type: string
          enum:
            - manual
            - automatic
            - automatic_async
          default: automatic
        description:
          type: string
          minLength: 1
          maxLength: 150
        items:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: object
            minProperties: 1
            required:
              - title
              - unit_price
              - quantity
            properties:
              title:
                type: string
                minLength: 1
                maxLength: 256
              unit_price:
                type: string
                minLength: 1
                maxLength: 32
              quantity:
                type: integer
                minimum: 1
              external_code:
                type: string
                minLength: 1
                maxLength: 30
              category_id:
                type: string
                minLength: 1
                maxLength: 156
              type:
                type: string
                minLength: 1
                maxLength: 20
              description:
                type: string
                minLength: 1
                maxLength: 256
              picture_url:
                type: string
                minLength: 1
                maxLength: 600
                pattern: https://*
                example: https://mysite.com/img/item.jpg
              warranty:
                type: boolean
              event_date:
                type: string
                maxLength: 40
        config:
          type: object
          properties:
            notification_url:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 512
              pattern: https://*
              example: https://mysite.com/notifications
            statement_descriptor:
              x-visibility: internal
              x-documented-by: checkout-pro
              type: string
              description: Description that appears on the buyer's card statement.
              minLength: 1
              maxLength: 50
              example: My Store
            default_payment_due_date:
              type: string
              format: duration
              pattern: ^P(?:\d+Y)?(?:\d+M)?(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+S)?)?$
              example: P1D
              description: Default ISO 8601 expiration duration applied to payments without an individual expiration_time.
            payment_method:
              type: object
              properties:
                not_allowed_ids:
                  x-visibility: internal
                  type: array
                  items:
                    type: string
                not_allowed_types:
                  x-visibility: internal
                  type: array
                  items:
                    type: string
                default_id:
                  x-visibility: internal
                  type: string
                max_installments:
                  x-visibility: internal
                  type: integer
                  minimum: 1
                  maximum: 36
                default_installments:
                  x-visibility: internal
                  type: integer
                  minimum: 1
                  maximum: 36
            online:
              type: object
              properties:
                callback_url:
                  type: string
                  minLength: 1
                  maxLength: 300
                  pattern: https://*
                  example: https://mysite.com/callback
                success_url:
                  x-visibility: internal
                  type: string
                  minLength: 1
                  maxLength: 300
                  pattern: https://*
                  example: https://mysite.com/success
                pending_url:
                  x-visibility: internal
                  type: string
                  minLength: 1
                  maxLength: 300
                  pattern: https://*
                  example: https://mysite.com/pending
                failure_url:
                  x-visibility: internal
                  type: string
                  minLength: 1
                  maxLength: 300
                  pattern: https://*
                  example: https://mysite.com/failure
                auto_return:
                  x-visibility: internal
                  x-documented-by: checkout-pro
                  type: string
                  enum:
                    - approved
                    - all
                differential_pricing:
                  x-visibility: internal
                  type: object
                  minProperties: 1
                  properties:
                    id:
                      type: integer
                      minimum: 1
                transaction_security:
                  type: object
                  properties:
                    validation:
                      type: string
                      enum:
                        - on_fraud_risk
                        - never
                    liability_shift:
                      type: string
                      enum:
                        - required
                retries:
                  type: object
                  description: Retry configuration for payment attempts. Only allowed when processing_mode is 'manual'.
                  properties:
                    allowed:
                      type: boolean
                      description: Whether to allow payment retries
                    max_attempts:
                      type: integer
                      minimum: 1
                      maximum: 5
                      description: Maximum number of payment attempts (default 3)
            split_rules:
              x-visibility: wip
              type: object
              description: Configuration for split payment rules
              properties:
                amount_type:
                  type: string
                  enum:
                    - percentage
                    - fixed
                  description: Type of amount calculation for splits
            cross_border:
              type: object
              description: >-
                Cross-border payment configuration. Use when the buyer pays in a currency different from the local
                currency.
              x-visibility: wip
              required:
                - destination_currency
              properties:
                destination_currency:
                  type: string
                  description: Target currency code (e.g., USD, EUR). Validated by the backend service.
                  example: USD
                  x-visibility: wip
                destination_amount:
                  type: string
                  description: >-
                    Amount in destination currency, serialized as a string to preserve precision. Calculated by Treasury
                    service if omitted.
                  example: '45.50'
                  x-visibility: wip
        checkout_available_at:
          x-visibility: internal
          type: string
          format: duration
          minLength: 1
        expiration_time:
          type: string
          format: duration
          minLength: 1
        shipment:
          type: object
          properties:
            address:
              type: object
              properties:
                zip_code:
                  type: string
                  minLength: 1
                  maxLength: 20
                street_name:
                  type: string
                  minLength: 1
                  maxLength: 100
                street_number:
                  type: string
                  minLength: 1
                  maxLength: 10
                city:
                  type: string
                  minLength: 1
                  maxLength: 40
                state:
                  type: string
                  minLength: 2
                  maxLength: 50
                complement:
                  type: string
                  minLength: 1
                  maxLength: 20
        additional_info:
          type: object
          properties:
            payer.authentication_type:
              x-visibility: internal
              type: string
            payer.registration_date:
              x-visibility: internal
              type: string
              maxLength: 40
            payer.is_prime_user:
              x-visibility: internal
              type: boolean
            payer.is_first_purchase_online:
              x-visibility: internal
              type: boolean
            payer.last_purchase:
              x-visibility: internal
              type: string
              maxLength: 40
            shipment.express:
              x-visibility: internal
              type: boolean
            shipment.local_pickup:
              x-visibility: internal
              type: boolean
            platform.shipment.delivery_promise:
              x-visibility: internal
              type: string
              maxLength: 40
            platform.shipment.drop_shipping:
              x-visibility: internal
              type: string
              maxLength: 40
            platform.shipment.safety:
              x-visibility: internal
              type: string
              maxLength: 40
            platform.shipment.tracking.code:
              x-visibility: internal
              type: string
              maxLength: 40
            platform.shipment.tracking.status:
              x-visibility: internal
              type: string
              maxLength: 40
            platform.shipment.withdrawn:
              x-visibility: internal
              type: boolean
            platform.seller.id:
              x-visibility: internal
              type: string
              pattern: ^[0-9]+$
            platform.seller.name:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 40
            platform.seller.email:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 128
              pattern: ^[a-z0-9!#$%&'+/=?^_{|}~-]+(?:.[a-z0-9!#$%&'+/=?^_{|}~-]+)*@(?:a-z0-9?.)+a-z0-9?$
            platform.seller.status:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 40
            platform.seller.referral_url:
              x-visibility: internal
              type: string
              format: uri
            platform.seller.registration_date:
              x-visibility: internal
              type: string
              maxLength: 40
            platform.seller.hired_plan:
              x-visibility: internal
              type: string
              maxLength: 40
            platform.seller.business_type:
              x-visibility: internal
              type: string
              maxLength: 40
            platform.seller.address.zip_code:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 20
            platform.seller.address.street_name:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 100
            platform.seller.address.street_number:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 10
            platform.seller.address.city:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 40
            platform.seller.address.state:
              x-visibility: internal
              type: string
              minLength: 2
              maxLength: 50
            platform.seller.address.complement:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 20
            platform.seller.address.country:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 40
            platform.seller.identification.type:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 5
            platform.seller.identification.number:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 50
            platform.seller.phone.area_code:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 10
            platform.seller.phone.number:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 20
            platform.authentication:
              x-visibility: internal
              type: string
              minLength: 1
              maxLength: 40
            payer.ip_address:
              type: string
              description: Payer's IP address. Required for PSE bank_transfer payments in MCO.
              minLength: 1
              maxLength: 39
            travel.passengers:
              x-visibility: internal
              type: array
              items:
                type: object
                properties:
                  first_name:
                    type: string
                    minLength: 1
                    maxLength: 50
                  last_name:
                    type: string
                    minLength: 1
                    maxLength: 100
                  identification:

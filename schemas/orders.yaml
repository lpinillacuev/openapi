          minLength: 1
          maxLength: 64
          pattern: ^([a-zA-Z0-9-_]+)$
          example: ext_ref_1234
        marketplace_fee:
          type: string
          maxLength: 32
          pattern: ^[0-9]+([.][0-9]{2,2})+?$
          description: This field is only used for the QR flow.
        integration_data:
          type: object
          minProperties: 1
          properties:
            corporation_id:
              type: string
              minLength: 1
              maxLength: 36
            integrator_id:
              type: string
              minLength: 1
              maxLength: 36
              pattern: ^dev_.*$
            platform_id:
              type: string
              minLength: 1
              maxLength: 36
            sponsor:
              type: object
              properties:
                id:
                  type: string
                  minLength: 1
                  maxLength: 15
        transactions:
          type: object
          minProperties: 1
          properties:
            payments:
              type: array
              minItems: 1
              maxItems: 1
              items:
                type: object
                minProperties: 1
                required:
                  - amount
                properties:
                  amount:
                    type: string
                    minLength: 4
                    maxLength: 32
                    pattern: ^[0-9]+([.][0-9]{2,2})+?$
                    example: '123.45'
            cash_outs:
              type: array
              minItems: 1
              maxItems: 1
              items:
                type: object
                minProperties: 1
                required:
                  - amount
                properties:
                  amount:
                    type: string
                    minLength: 4
                    maxLength: 32
                    pattern: ^[0-9]+([.][0-9]{2,2})+?$
                    example: '123.45'
                  additional_info:
                    type: object
                    properties:
                      external_cashier_id:
                        type: integer
                      fixed_amount:
                        type: boolean
                      agency_type:
                        type: string
                        enum:
                          - AGTEC
                          - AGTOT
                          - AGPSS
                      bank_service_code:
                        type: string
        config:
          type: object
          minProperties: 1
          required:
            - qr
          properties:
            qr:
              type: object
              minProperties: 1
              required:
                - external_pos_id
              properties:
                external_pos_id:
                  type: string
                  minLength: 1
                  maxLength: 40
                mode:
                  type: string
                  enum:
                    - static
                    - dynamic
                    - hybrid
            payment_method:
              type: object
              properties:
                default_type:
                  type: string
                  example: credit_card
                installments_cost:
                  type: string
                  example: seller
                installments:
                  type: object
                  properties:
                    interest_free:
                      type: object
                      properties:
                        type:
                          type: string
                          example: range
                        values:
                          type: array
                          items:
                            type: integer
                          example:
                            - 1
                            - 6
                    available:
                      type: object
                      properties:
                        type:
                          type: string
                          example: all
        total_amount:
          type: string
          minLength: 1
          maxLength: 32
          pattern: ^[0-9]+([.][0-9]{2,2})+?$
          example: '1234.56'
        processing_mode:
          type: string
          enum:
            - manual
            - automatic
            - automatic_async
          default: automatic
        description:
          type: string
          minLength: 1
          maxLength: 150
        items:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: object
            minProperties: 1
            required:
              - title
              - unit_price
              - quantity
              - unit_measure
            properties:
              title:
                type: string
                minLength: 1
                maxLength: 150
              unit_price:
                type: string
                minLength: 4
                maxLength: 32
                pattern: ^[0-9]+([.][0-9]{2,2})+?$
              quantity:
                type: integer
                minimum: 1
              unit_measure:
                type: string
                minLength: 1
                maxLength: 10
              external_code:
                type: string
              external_categories:
                type: array
                uniqueItems: true
                minItems: 1
                items:
                  type: object
                  minProperties: 1
                  required:
                    - id
                  properties:
                    id:
                      type: string
                      minLength: 1
        discounts:
          type: object
          minProperties: 1
          required:
            - payment_methods
          properties:
            payment_methods:
              type: array
              minItems: 1
              items:
                type: object
                minProperties: 1
                required:
                  - type
                  - new_total_amount
                properties:
                  new_total_amount:
                    type: string
                    maxLength: 32
                    pattern: ^[0-9]+([.][0-9]{2,2})+?$
                  type:
                    type: string
                    enum:
                      - credit_card
                      - debit_card
                      - account_money
                      - prepaid_card
        taxes:
          type: array
          minItems: 1
          description: This field is only available for site MLC
          items:
            type: object
            minProperties: 1
            required:
              - payer_condition
            properties:
              payer_condition:
                type: string
                enum:
                  - payment_exempt_iva
                  - payment_taxable_iva
    OrderQRResponse:
      description: Order response for type=qr
      properties:
        id:
          type: string
          example: ORD01HRYJPXYM3ZK71F31AQR76KGR
        type:
          type: string
        external_reference:
          type: string
        country_code:
          type: string
          enum:
            - ARG
            - BRA
            - CHL
            - COL
            - MEX
            - PER
            - URY
            - VEN
        status:
          type: string
        user_id:
          type: string
        marketplace_fee:
          type: string
        currency:
          type: string
        integration_data:
          type: object
          minProperties: 1
          properties:
            corporation_id:
              type: string
              minLength: 1
              maxLength: 36
            application_id:
              type: string
            integrator_id:
              type: string
              minLength: 1
              maxLength: 15
            platform_id:
              type: string
              minLength: 1
              maxLength: 15
            sponsor:
              type: object
              properties:
                id:
                  type: string
        transactions:
          type: object
          properties:
            payments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: PAY01HRYJPXYM3ZK71F31AQR76KGR
                  reference_id:
                    type: string
                  status:
                    type: string
                  amount:
                    type: string
                  paid_amount:
                    type: string
                  provider:
                    type: string
                  authorization_code:
                    type: string
                    description: Authorization code returned by the card network after payment approval
                  card:
                    x-visibility: internal
                    type: object
                    properties:
                      last_digits:
                        type: string
                      first_digits:
                        type: string
            cash_outs:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: CAS01HRYJPXYM3ZK71F31AQR76KGR
                  reference_id:
                    type: string
                  status:
                    type: string
                  amount:
                    type: string
                  additional_info:
                    type: object
                    properties:
                      external_cashier_id:
                        type: integer
                      fixed_amount:
                        type: boolean
                      agency_type:
                        type: string
                        enum:
                          - AGTEC
                          - AGTOT
                          - AGPSS
                      bank_service_code:
                        type: string
        config:
          type: object
          properties:
            notification_url:
              type: string
              description: URL to receive notifications about order status changes
              example: https://mysite.com/notifications
            statement_descriptor:
              type: string
              description: Description that appears on the buyer's card statement.
              minLength: 1
              maxLength: 50
              example: My Store
            default_payment_due_date:
              type: string
              format: duration
              pattern: ^P(?:\d+Y)?(?:\d+M)?(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+S)?)?$
              example: P1D
              description: Default ISO 8601 expiration duration applied to payments without an individual expiration_time.
            qr:
              type: object
              properties:
                external_pos_id:
                  type: string
                  minLength: 1
                  maxLength: 40
                mode:
                  type: string
                  enum:
                    - static
                    - dynamic
                    - hybrid
            payment_method:
              type: object
              properties:
                default_type:
                  type: string
                  example: credit_card
                installments_cost:
                  type: string
                  example: seller
                installments:
                  type: object
                  properties:
                    interest_free:
                      type: object
                      properties:
                        type:
                          type: string
                          example: range
                        values:
                          type: array
                          items:
                            type: integer
                          example:
                            - 1
                            - 6
                    available:
                      type: object
                      properties:
                        type:
                          type: string
                          example: all
        total_amount:
          type: string
        total_paid_amount:
          type: string
        processing_mode:
          type: string
          enum:
            - manual
            - automatic
          default: automatic
        description:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              unit_price:
                type: string
              quantity:
                type: integer
              unit_measure:
                type: string
                enum:
                  - unit
                  - pack
              external_code:
                type: string
              external_categories:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
        discounts:
          type: object
          properties:
            payment_methods:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                      - credit_card
                      - debit_card
                      - account_money
                      - prepaid_card
                  new_total_amount:
                    type: string
        taxes:
          type: array
          items:
            type: object
            properties:
              payer_condition:
                type: string
                enum:
                  - payment_exempt_iva
                  - payment_taxable_iva
        type_response:
          type: object
          properties:
            qr_data:
              type: string
    OrderRefundRequest:
      type: object
      description: >
        Refund request for an order. Omit transactions for a full refund. Include specific transaction amounts for
        partial refunds.
      properties:
        transactions:
          type: array
          description: Transactions to refund. Omit for full order refund.
          items:
            type: object
            properties:
              id:
                type: string
                description: Transaction ID to refund.
              amount:
                type: string
                description: Amount to refund. Omit for full transaction refund.
    OrderRequest:
      type: object
      required:
        - type
        - total_amount
        - transactions
        - payer
      description: >
        Request body to create an Order. Supports automatic (single-stage) and manual (multi-stage) processing modes.
        Use processing_mode=automatic for most integrations.
      properties:
        type:
          type: string
          enum:
            - online
          description: Order type. Only "online" is supported for online payments.
          example: online
        processing_mode:
          type: string
          enum:
            - automatic
            - manual
          description: >
            automatic — MP processes all transactions immediately in a single stage. manual — transactions are processed
            in configurable stages; use the /process endpoint to trigger processing after creation.
          example: automatic
        capture_mode:
          type: string
          enum:
            - automatic
            - manual
            - automatic_async
          description: >
            automatic — authorize and capture funds at the same time. manual — authorize only (reserve funds); capture
            later with /capture endpoint. automatic_async — order may remain in status=processing while awaiting async
            update; final status delivered via webhook.
          example: automatic
        total_amount:
          type: string
          description: >
            Total amount to be paid as a decimal string. Must equal the sum of all payment transaction amounts. Example:
            "100.00".
          example: '100.00'
        external_reference:
          type: string
          description: Your internal order reference ID. Returned in all order responses.
          example: ORDER-2024-001234
        description:
          type: string
          description: Description of the purchased product or service.
          example: Premium subscription
        payer:
          $ref: '#/components/schemas/OrderPayer'
        transactions:
          $ref: '#/components/schemas/OrderTransactions'
        config:
          $ref: '#/components/schemas/OrderConfig'
        items:
          type: array
          description: Items included in the order.
          items:
            $ref: '#/components/schemas/OrderItem'
        shipment:
          $ref: '#/components/schemas/OrderShipment'
        additional_info:
          type: object
          description: Additional information required for specific payment methods (e.g. PSE).
          properties:
            payer:
              type: object
              properties:
                ip_address:
                  type: string
                  description: IP address of the payer. Required for PSE payments.
                  example: 200.100.50.25
        integration_data:
          type: object
          description: Integration metadata used by MercadoPago internally.
          properties:
            platform_id:
              type: string
            sponsor_id:
              type: integer
    OrderSearchResult:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        paging:
          type: object
          properties:
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
    OrderShipment:
      type: object
      properties:
        address:
          type: object
          properties:
            zip_code:
              type: string
            street_name:
              type: string
            street_number:
              type: string
            neighborhood:
              type: string
            city:
              type: string
            state:
              type: string
            complement:
              type: string
    OrderTransactionPayment:
      type: object
      properties:
        id:
          type: string
          description: Transaction ID, automatically generated by MercadoPago.
        amount:
          type: string
          description: Transaction amount.
          example: '100.00'
        paid_amount:
          type: string
          description: Amount effectively paid.
        reference_id:
          type: string
          description: External reference for this transaction.
        status:
          type: string
          enum:
            - created
            - processed
            - action_required
            - processing
          description: >
            created — transaction created; processed — transaction successfully processed; action_required — integrator
            must act (e.g. capture); processing — awaiting asynchronous result.
        status_detail:
          type: string
          enum:
            - accredited
            - waiting_capture
            - created
            - pending_review_manual
            - in_process
        date_of_expiration:
          type: string
          format: date-time
        expiration_time:
          type: string
          description: Expiration duration in ISO 8601 format.
        payment_method:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            token:
              type: string
            installments:
              type: integer
            statement_descriptor:
              type: string
            ticket_url:
              type: string
              format: uri
              description: URL to view or print the ticket (Boleto, OXXO, etc.).
            barcode_content:
              type: string
              description: Barcode string for offline payment methods.
            reference:
              type: string
              description: Reference number for offline payment methods.
            verification_code:
              type: string
            financial_institution:
              type: string
            redirect_url:
              type: string
              format: uri
              description: >
                Redirect URL for PSE bank transfer (Colombia). In production, redirect the payer to this URL to complete
                authentication at their bank.
            digitable_line:
              type: string
              description: Digitable line for Boleto payments.
            qr_code:
              type: string
              description: QR code string for Pix payments.
            qr_code_base64:
              type: string
              description: QR code image as Base64 for Pix payments.
            e2e_id:
              type: string
              description: End-to-end identifier for Pix transactions (mandatory tracking code).
            transaction_security:
              type: object
              description: 3DS challenge result.
              properties:
                status:
                  type: string
                  enum:
                    - pending
                    - success
                    - failed
                redirect_url:
                  type: string
                  format: uri
                  description: URL to redirect payer to complete 3DS challenge (when status=pending).
    OrderTransactions:
      type: object
      description: Payment transactions for this order. Currently supports one transaction.
      properties:
        payments:
          type: array
          description: >
            Payment transaction(s). Required when processing_mode=automatic. Must not be present when
            processing_mode=manual (add via POST /orders/{id}/transactions).
          items:
            $ref: '#/components/schemas/OrderPayment'

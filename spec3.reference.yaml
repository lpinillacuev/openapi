                      street_name: Av. Paulista
                      street_number: '100'
                      city: SAO PAULO
                      state: SP
                  transactions:
                    payments:
                    - amount: '100.00'
                      expiration_time: P1D
                      payment_method:
                        id: bolbradesco
                        type: ticket
              oxxo:
                summary: OXXO — Mexico (MLM)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '500.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '500.00'
                      expiration_time: P3D
                      payment_method:
                        id: oxxo

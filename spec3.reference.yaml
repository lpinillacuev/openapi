  /v1/orders:
    post:
      description:
        en: 'Creates an Order for processing payment transactions. Supports automatic (single-stage, set processing_mode=automatic)
          and manual (multi-stage, set processing_mode=manual) modes.


          In automatic mode, include the transactions.payments array with the payment method. In manual mode, omit transactions
          and add them later via POST /v1/orders/{id}/transactions, then trigger processing with POST /v1/orders/{id}/process.


          Available for: credit card, debit card, Pix (MLB), Boleto (MLB), OXXO (MLM), SPEI (MLM), PSE (MCO), Rapipago (MLA),
          Pago Fácil (MLA).'
        pt: TODO
        es: TODO
      tags:
      - Orders
      parameters:
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
        description:
          en: Unique key per order creation attempt. Prevents duplicate orders on retry.
          pt: TODO
          es: TODO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
            examples:
              credit_card:
                summary: Credit card — all countries
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '100.00'
                      payment_method:
                        id: visa
                        type: credit_card
                        token: 1c87b6b301010101ddcd92f9bbbb3be2
                        installments: 1
              pix:
                summary: Pix — Brazil (MLB)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '100.00'
                      expiration_time: P1D
                      payment_method:
                        id: pix
                        type: bank_transfer
              boleto:

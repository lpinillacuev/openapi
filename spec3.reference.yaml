url: https://api.mercadopago.com
paths:
  /v1/payments:
    post:
      description:
        en: 'Creates a payment. For card payments, generate a card token client-side via MercadoPago.js before calling this
          endpoint. For cash/offline methods (Boleto, OXXO, Pix), the response includes a payment URL in `transaction_details.external_resource_url`.

          **Idempotency**: Include `X-Idempotency-Key` to safely retry on network errors without risk of double charges.

          **Recommendation**: For new integrations, prefer the Orders API (`POST /v1/orders`).

          **Idempotent:** Supports `X-Idempotency-Key` header to safely retry without duplicate charges.

          **Webhook events triggered:** payment, merchant_order'
        pt: TODO
        es: TODO
      tags:
      - Payments
      parameters:
      - name: X-Idempotency-Key
        in: header
        required: false
        schema:
          type: string
          format: uuid
        description:
          en: Unique key per payment attempt. If you retry with the same key and the original payment was processed, MP returns
            the original result without creating a duplicate.
          pt: TODO
          es: TODO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
            examples:
              card_brazil:
                summary: Credit card — Brazil (Visa)
                value:
                  transaction_amount: 100.5
                  token: YOUR_ACCESS_TOKEN
                  description: Premium subscription — 1 month
                  installments: 1
                  payment_method_id: visa
                  payer:
                    email: test@example.com
                    identification:
                      type: CPF
                      number: '12345678909'
              pix_brazil:
                summary: Pix — Brazil
                value:
                  transaction_amount: 100.5
                  payment_method_id: pix
                  payer:
                    email: test@example.com
                    identification:
                      type: CPF
                      number: '12345678909'
              boleto_brazil:
                summary: Boleto Bancário — Brazil
                value:
                  transaction_amount: 100.5
                  payment_method_id: bolbradesco
                  payer:
                    email: test@example.com
                    first_name: João
                    last_name: Silva
                    identification:
                      type: CPF
                      number: '12345678909'
              card_argentina:
                summary: Credit card — Argentina (Visa)
                value:
                  transaction_amount: 5000.0
                  token: YOUR_ACCESS_TOKEN
                  description: 'Order #1234'
                  installments: 3
                  payment_method_id: visa
                  payer:
                    email: test@example.com
                    identification:
                      type: DNI
                      number: '12345678'
              oxxo_mexico:
                summary: OXXO — Mexico
                value:
                  transaction_amount: 500.0
                  payment_method_id: oxxo
                  date_of_expiration: '2024-12-31T23:59:59.000-06:00'
                  payer:
                    email: test@example.com
      responses:
        '201':
          description:
            en: Payment created
            pt: TODO
            es: TODO
